let lang = localStorage.getItem('nudisol_lang') || 'es';

function setLang(l) {
  lang = l;
  localStorage.setItem('nudisol_lang', l);
  document.getElementById('btn-es').classList.toggle('active', l === 'es');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  applyLang();
  renderListings();
}

function applyLang() {
  const t = TR[lang];
  document.getElementById('aloj-titulo').textContent = t.titulo;
  if (zonaActiva) {
    document.getElementById('hero-title').innerHTML = t.heroConZona(zonaActiva);
    document.getElementById('hero-sub').textContent = t.subConZona;
    document.getElementById('zona-sub').textContent = t.zonaSub;
    document.getElementById('btn-ver-todo').textContent = t.btnVerTodo;
  } else {
    document.getElementById('hero-title').innerHTML = t.heroSinZona;
    document.getElementById('hero-sub').textContent = t.subSinZona;
  }
  document.getElementById('f-todo').textContent = t.fTodo;
  document.getElementById('f-apart').textContent = t.fApart;
  document.getElementById('f-camping').textContent = t.fCamping;
  document.getElementById('f-hotel').textContent = t.fHotel;
  document.getElementById('f-bungalow').textContent = t.fBungalow;
  document.getElementById('f-casa').textContent = t.fCasa;
  document.getElementById('fp-precio-nota').textContent = t.precioNota;
  document.getElementById('fp-nudistas-titulo').textContent = t.nudistasAhora;
  document.getElementById('btn-contactar').textContent = t.btnContactar;
  document.getElementById('btn-mapa-volver').textContent = t.btnMapaVolver;
  document.getElementById('nav-mapa').textContent = t.navMapa;
  document.getElementById('nav-buscar').textContent = t.navBuscar;
  document.getElementById('nav-aloj').textContent = t.navAloj;
  document.getElementById('nav-perfil').textContent = t.navPerfil;
}

const params = new URLSearchParams(window.location.search);
const zonaParam = params.get('zona');
let zonaActiva = zonaParam || null;
let filtroActivo = 'todos';
let fichaActual = null;

if (zonaActiva) {
  document.getElementById('zona-banner').style.display = 'block';
  document.getElementById('zona-texto').textContent = `📍 ${zonaActiva}`;
}

function verTodo() {
  zonaActiva = null;
  document.getElementById('zona-banner').style.display = 'none';
  applyLang();
  renderListings();
}

function getListaFiltrada() {
  let lista = alojamientos;
  if (zonaActiva) {
    lista = lista.filter(a => a.zonas.some(z =>
      z.toLowerCase().includes(zonaActiva.toLowerCase()) ||
      zonaActiva.toLowerCase().includes(z.toLowerCase())
    ));
  }
  if (filtroActivo !== 'todos') lista = lista.filter(a => a.tipo === filtroActivo);
  return lista;
}

function traducirBadge(badge) {
  if (lang === "es") return badge;
  const m = {
    "⭐ Top nudista":"⭐ Top nudist",
    "🔥 Muy solicitado":"🔥 In demand",
    "📍 Naturista":"📍 Naturist",
    "🌞 Naturista":"🌞 Naturist",
    "⛺ Naturista":"⛺ Naturist",
    "💰 Mejor precio":"💰 Best price",
    "🏨 Hotel naturista":"🏨 Nudist hotel",
    "💎 Premium":"💎 Premium",
    "🌟 Exclusivo":"🌟 Exclusive",
    "🏕️ Camping":"🏕️ Campsite",
    "⭐ Costa Brava":"⭐ Costa Brava",
    "🌊 Costa Blanca":"🌊 Costa Blanca",
    "🌊 Costa Azahar":"🌊 Costa Azahar"
  };
  return m[badge] || badge;
}

function renderListings() {
  const t = TR[lang];
  const container = document.getElementById('listings');
  const lista = getListaFiltrada();

  document.getElementById('results-label').innerHTML = lista.length > 0
    ? t.resultados(lista.length, zonaActiva) : '';

  if (lista.length === 0) {
    container.innerHTML = `
      <div class="no-results">
        <div class="no-results-icon">🏖️</div>
        <div class="no-results-title">${t.noResults(zonaActiva)}</div>
        <div class="no-results-sub">${t.noResultsSub}</div>
        <button class="btn-ver-esp" onclick="verTodo()">${t.btnVerEsp}</button>
      </div>`;
    return;
  }

  container.innerHTML = lista.map(a => `
    <div class="card" onclick="abrirFicha(${a.id})">
      <div class="card-img ${a.img}">
        <div class="card-img-overlay"></div>
        <div class="card-badge ${a.badgeClass}">${traducirBadge(a.badge)}</div>
        <div class="card-nudistas"><div class="live-dot"></div>${t.nudistasNow(a.nudistas)}</div>
      </div>
      <div class="card-body">
        <div class="card-top">
          <div><div class="card-name">${a.nombre}</div><div class="card-location">📍 ${a.ubicacion} · ${a.distPlaya} ${t.fromBeach}</div></div>
          <div><div class="card-price">${a.precio}€</div><div class="card-price-unit">${t.noche}</div></div>
        </div>
        <div class="card-tags">${a.tags.map((tag,i)=>`<span class="tag ${i===0?'green':''}">${i===0?t.verificado:tag}</span>`).join('')}</div>
        <div class="card-footer">
          <div class="card-rating">⭐ ${a.rating} <span class="card-reviews">(${a.reviews} ${t.resenas})</span></div>
          <div class="card-verified">${t.anfitrion}</div>
        </div>
      </div>
    </div>`).join('');
}

function abrirFicha(id) {
  const t = TR[lang];
  fichaActual = alojamientos.find(a => a.id === id);
  if (!fichaActual) return;
  document.getElementById('fp-nombre').textContent = fichaActual.nombre;
  document.getElementById('fp-location').textContent = `📍 ${fichaActual.ubicacion} · ${fichaActual.distPlaya} ${t.fromBeach}`;
  document.getElementById('fp-precio').innerHTML = `${fichaActual.precio}€<span style="font-size:14px;font-weight:400;color:#8A8A8A;">${t.noche}</span>`;
  document.getElementById('fp-precio-nota').textContent = t.precioNota;
  document.getElementById('fp-nudistas-titulo').textContent = t.nudistasAhora;
  document.getElementById('fp-playa').textContent = `${fichaActual.distPlaya} ${t.fromBeach} · ${t.sinTextiles} · 28°C`;
  document.getElementById('fp-nudistas').textContent = fichaActual.nudistas;
  document.getElementById('fp-desc').textContent = fichaActual.desc;
  document.getElementById('fp-amenities').innerHTML = fichaActual.amenities.map(a=>`
    <div class="amenity"><div class="amenity-icon">${a.split(' ')[0]}</div><span>${a.split(' ').slice(1).join(' ')}</span></div>`).join('');
  document.getElementById('btn-contactar').textContent = t.btnContactar;
  document.getElementById('btn-mapa-volver').textContent = t.btnMapaVolver;
  const hero = document.getElementById('ficha-hero');
  hero.className = `ficha-hero ${fichaActual.img}`;
  hero.innerHTML = `<div class="ficha-hero-overlay"></div>`;
  document.getElementById('ficha-overlay').style.display = 'block';
  document.getElementById('ficha-panel').style.display = 'block';
}

function cerrarFicha() {
  document.getElementById('ficha-overlay').style.display = 'none';
  document.getElementById('ficha-panel').style.display = 'none';
}

function contactar() {
  const asunto = encodeURIComponent(lang === 'en'
    ? `Booking request — ${fichaActual.nombre}`
    : `Solicitud de reserva — ${fichaActual.nombre}`);
  const cuerpo = encodeURIComponent(lang === 'en'
    ? `Hello,\n\nI am interested in the accommodation "${fichaActual.nombre}" (${fichaActual.ubicacion}).\n\nDates: \nGuests: \n\nPlease let me know availability and pricing.\n\nThank you.`
    : `Hola,\n\nEstoy interesado/a en el alojamiento "${fichaActual.nombre}" (${fichaActual.ubicacion}).\n\nFechas: \nPersonas: \n\nPor favor, indícame disponibilidad y condiciones.\n\nGracias.`);
  window.open(`mailto:pedro@nudisol.com?subject=${asunto}&body=${cuerpo}`, '_blank');
}

function filtrar(el, tipo) {
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  filtroActivo = tipo;
  renderListings();
}

// Inicializar
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btn-es').classList.toggle('active', lang === 'es');
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  applyLang();
  renderListings();
});
</script>

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>
