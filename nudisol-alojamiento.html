<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--sand-light); min-height: 100vh; display: flex; flex-direction: column; }

  #zona-banner { display: none; background: linear-gradient(135deg, var(--ocean), var(--ocean-light)); padding: 12px 16px; }
  .zona-banner-content { display: flex; align-items: center; justify-content: space-between; }
  .zona-texto { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: white; }
  .zona-sub { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; }
  .btn-ver-todo { background: rgba(255,255,255,0.2); color: white; border: none; border-radius: 10px; padding: 6px 12px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; cursor: pointer; }

  .hero { background: linear-gradient(160deg, #1a0808, #3d1200, #6B2000); padding: 20px 20px 24px; position: relative; overflow: hidden; }
  .hero-wave { position: absolute; bottom: 0; left: 0; right: 0; }
  .hero-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: white; line-height: 1.2; margin-bottom: 6px; position: relative; z-index: 1; }
  .hero-title span { color: var(--sun); }
  .hero-sub { font-size: 13px; color: rgba(255,200,150,0.65); position: relative; z-index: 1; }

  .filters-wrap { padding: 12px 16px 0; background: var(--white); border-bottom: 1px solid rgba(0,0,0,0.06); }
  .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-pill { background: var(--sand-light); border: 1.5px solid transparent; border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--text-mid); white-space: nowrap; cursor: pointer; font-family: 'Syne', sans-serif; transition: all 0.2s; }
  .filter-pill.active { background: var(--ocean); color: white; border-color: var(--ocean); }

  .results-label { padding: 12px 16px 4px; font-size: 12px; color: var(--text-light); font-weight: 500; }
  .results-label b { color: var(--ocean); }

  .listings { padding: 8px 16px; display: flex; flex-direction: column; gap: 16px; flex: 1; padding-bottom: 80px; }

  .card { background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: 0 2px 16px rgba(0,0,0,0.08); cursor: pointer; transition: transform 0.2s; }
  .card:hover { transform: translateY(-2px); }

  .card-img { height: 160px; position: relative; display: flex; align-items: center; justify-content: center; font-size: 50px; }
  .img-1 { background: linear-gradient(135deg, #7ec8d0, #c8e4c0, #e8d4a0); }
  .img-2 { background: linear-gradient(135deg, #4a9cb8, #7ad0d8, #d4c890); }
  .img-3 { background: linear-gradient(135deg, #c8904a, #e8b870, #f0d090); }
  .img-4 { background: linear-gradient(135deg, #2a7a90, #5ab8c8, #c8e8d0); }
  .img-5 { background: linear-gradient(135deg, #7a4a90, #b870c8, #e8d0f0); }
  .img-6 { background: linear-gradient(135deg, #4a7a30, #8ab860, #c8e890); }
  .img-7 { background: linear-gradient(135deg, #906030, #c89060, #e8c890); }
  .img-8 { background: linear-gradient(135deg, #304a90, #6080c8, #b0c8e8); }
  .img-9 { background: linear-gradient(135deg, #903040, #c86080, #e8b0c0); }
  .img-10 { background: linear-gradient(135deg, #309060, #60c890, #b0e8c8); }

  .card-img-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.3) 100%); }
  .card-badge { position: absolute; top: 10px; left: 10px; background: var(--coral); color: white; border-radius: 20px; padding: 4px 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; z-index: 1; }
  .card-badge.top { background: var(--sun); color: var(--ocean-deep); }
  .card-naturistas { position: absolute; bottom: 10px; right: 10px; background: rgba(13,61,66,0.85); color: white; border-radius: 10px; padding: 4px 8px; font-size: 11px; font-weight: 600; display: flex; align-items: center; gap: 4px; z-index: 1; }
  .live-dot { width: 5px; height: 5px; background: var(--coral); border-radius: 50%; animation: blink 1.2s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .card-body { padding: 12px 14px; }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3px; }
  .card-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: var(--text-dark); line-height: 1.2; flex: 1; }
  .card-price { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 16px; color: var(--ocean); text-align: right; }
  .card-price-unit { font-size: 10px; color: var(--text-light); text-align: right; }
  .card-location { font-size: 11px; color: var(--text-light); margin-bottom: 8px; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
  .tag { background: var(--sand-light); border-radius: 8px; padding: 3px 8px; font-size: 10px; color: var(--text-mid); font-weight: 500; }
  .tag.green { background: #e8f4ec; color: var(--green); font-weight: 700; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 1px solid rgba(0,0,0,0.06); }
  .card-rating { font-size: 12px; font-weight: 600; color: var(--text-dark); }
  .card-reviews { font-size: 10px; color: var(--text-light); font-weight: 400; }
  .card-verified { font-size: 10px; color: var(--green); font-weight: 600; }

  .no-results { text-align: center; padding: 40px 20px; }
  .no-results-icon { font-size: 48px; margin-bottom: 12px; }
  .no-results-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: var(--text-dark); margin-bottom: 6px; }
  .no-results-sub { font-size: 13px; color: var(--text-light); margin-bottom: 16px; }
  .btn-ver-esp { background: var(--ocean); color: white; border: none; border-radius: 14px; padding: 12px 20px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; }

  #ficha-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; }
  #ficha-panel { display: none; position: fixed; bottom: 0; left: 0; right: 0; max-height: 90vh; background: var(--white); border-radius: 24px 24px 0 0; z-index: 300; overflow-y: auto; padding-bottom: 24px; }
  .ficha-handle { width: 40px; height: 4px; background: rgba(0,0,0,0.15); border-radius: 2px; margin: 12px auto 16px; }
  .ficha-hero { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 60px; margin: 0 16px; border-radius: 16px; position: relative; overflow: hidden; }
  .ficha-hero-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.4) 100%); }
  .ficha-body { padding: 16px; }
  .ficha-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--text-dark); margin-bottom: 4px; }
  .ficha-location { font-size: 13px; color: var(--text-light); margin-bottom: 12px; }
  .ficha-live { background: linear-gradient(135deg, var(--ocean-deep), var(--ocean)); border-radius: 14px; padding: 12px 14px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }

  .ficha-live-count { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; color: var(--sun); }
  .ficha-amenities { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .amenity { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-mid); }
  .amenity-icon { width: 28px; height: 28px; background: var(--sand-light); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .ficha-desc { font-size: 13px; color: var(--text-mid); line-height: 1.6; margin-bottom: 12px; }
  .precio-grande { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; color: var(--ocean); margin-bottom: 2px; }
  .precio-nota { font-size: 11px; color: var(--green); font-weight: 600; margin-bottom: 12px; }
  .btn-contactar { width: 100%; background: var(--coral); color: white; border: none; border-radius: 16px; padding: 14px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; margin-bottom: 8px; }
  .btn-mapa { width: 100%; background: var(--sand-light); color: var(--text-dark); border: none; border-radius: 16px; padding: 12px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; }

  .bottom-nav { background: var(--white); border-top: 1px solid rgba(0,0,0,0.08); display: flex; justify-content: space-around; padding: 8px 0 12px; position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; }

  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--ocean); font-family: 'Syne', sans-serif; }

  /* SELECTOR IDIOMA */
  .lang-selector-aloj { display: flex; gap: 4px; }
  .lang-btn-aloj { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); border: none; border-radius: 6px; padding: 3px 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; cursor: pointer; }

  }
  // También exponer para que setLang pueda llamarla
  window.traducirPildoras = traducirPildoras;
})();
</script>
<script>
(function(){
  var NAV={es:{inicio:'Inicio',lugares:'Lugares',comunidad:'Comunidad',alojamiento:'Alojamiento',perfil:'Perfil'},
            en:{inicio:'Home',lugares:'Places',comunidad:'Community',alojamiento:'Stay',perfil:'Profile'}};
  function applyNav(l){
    var n=NAV[l]||NAV.es;
    var s=function(id,v){var e=document.getElementById(id);if(e)e.textContent=v;};
    s('nlang-inicio',n.inicio);s('nlang-lugares',n.lugares);
    s('nlang-comunidad',n.comunidad);s('nlang-alojamiento',n.alojamiento);s('nlang-perfil',n.perfil);
    var es=document.getElementById('lang-es'),en=document.getElementById('lang-en');
    if(es)es.style.opacity=l==='es'?'1':'0.4';
    if(en)en.style.opacity=l==='en'?'1':'0.4';
  }
  window.nudisol_setLang=function(l){
    localStorage.setItem('nudisol_lang',l);
    applyNav(l);
    if(typeof nudisol_applyPageLang==='function')nudisol_applyPageLang(l);
  };
  document.addEventListener('DOMContentLoaded',function(){
    var l=localStorage.getItem('nudisol_lang')||'es';
    applyNav(l);
    if(typeof nudisol_applyPageLang==='function')nudisol_applyPageLang(l);
  });
  // Si el DOM ya está listo, aplicar ahora mismo
  if(document.readyState==='complete'||document.readyState==='interactive'){
    var l=localStorage.getItem('nudisol_lang')||'es';
    applyNav(l);
    if(typeof nudisol_applyPageLang==='function')nudisol_applyPageLang(l);
  }
})();
</script>

</body>
