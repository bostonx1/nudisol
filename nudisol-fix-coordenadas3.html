<body>
<h2>🗺️ Nudisol — Corrector Coordenadas v3 (tercera pasada)</h2>
<p>Usa viewbox por provincia y topónimos simplificados. Solo los 205 restantes sin coords_fuente.</p>

<div class="btns">
  <button id="btn-start" onclick="iniciar()">🚀 Tercera pasada</button>
  <button id="btn-stop" class="sec" onclick="detener()" disabled>⏹ Detener</button>
</div>
<div id="barra-wrap"><div id="barra"></div></div>
<div id="pct"></div>
<div id="resumen"></div>
<div id="log" style="margin-top:12px;"></div>

<script type="module">

import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyB3jsPPuKLPEj3B3y-PsIpXCyZXHxY81aQ",
  authDomain: "nudisol.firebaseapp.com",
  projectId: "nudisol",
  storageBucket: "nudisol.firebasestorage.app",
  messagingSenderId: "222881387953",
  appId: "1:222881387953:web:4299a66c2dcb6b5c941990"
});

const auth = getAuth(app);
const db = getFirestore(app);
let parar = false;

// Viewbox por provincia [minLng, minLat, maxLng, maxLat]
const VIEWBOX = {
  'Almería':     [-3.1,  36.6, -1.6, 37.8],

  'Jaén':        [-4.1,  37.3, -2.5, 38.6],
  'Málaga':      [-5.3,  36.4, -3.8, 37.3],
  'Sevilla':     [-6.4,  36.9, -4.8, 38.1],
  'Alicante':    [-1.2,  37.8,  0.5, 38.9],
  'Castellón':   [-0.6,  39.7,  0.6, 40.8],

  'Mallorca':    [ 2.2,  39.2,  3.5, 40.1],

  'Gran Canaria':[-15.9, 27.7,-15.3, 28.2],
  'Lanzarote':   [-13.9, 28.8,-13.4, 29.3],

  'Zamora':      [-6.8,  41.0, -5.2, 42.2],
  'León':        [-7.1,  41.8, -4.7, 43.1],
  'Palencia':    [-4.9,  41.7, -3.8, 43.0],
};

// Palabras a eliminar del nombre para obtener el topónimo
const QUITAR = [
  'playa de la', 'playa de los', 'playa de las', 'playa del', 'playa de',
  'cala de la', 'cala de los', 'cala del', 'cala de',
  'praia de', 'praia da', 'praia do',
  'zona nudista', 'zona naturista', 'zona gay', 'zona natural',
  'nudista', 'naturista', 'gay-friendly', 'gay friendly',
  'playa nudista', 'playa naturista',
  'embalse de', 'embalse del', 'río ', 'rio ',
  'camping naturista', 'asociación naturista', 'asociacion naturista',
  'parque natural', 'paraje natural',
  'pozas nudistas', 'pozas naturistas', 'pozas',
  'naturismo', 'naturismo granada', 'naturismo córdoba',
];

function extraerToponimo(nombre) {
  // Quitar lo que va después del guión
  let n = nombre.split('—')[0].split(' — ')[0].trim().toLowerCase();
  for (const q of QUITAR) n = n.replace(q, '').trim();
  // Capitalizar
  n = n.charAt(0).toUpperCase() + n.slice(1);
  return n.trim();
}

function generarQueries(lugar) {
  const top = extraerToponimo(lugar.nombre);
  const prov = lugar.provincia || '';
  const com = lugar.comunidad || '';
  const vb = VIEWBOX[prov];
  const viewboxParam = vb ? `&viewbox=${vb[0]},${vb[3]},${vb[2]},${vb[1]}&bounded=1` : '';

  return [
    // Con viewbox acotado a la provincia
    { q: `${top}, ${prov}, Spain`, viewbox: viewboxParam },
    { q: `${top}, ${com}, Spain`, viewbox: viewboxParam },
    { q: top + ', Spain', viewbox: viewboxParam },
    // Sin viewbox por si acaso
    { q: `${top}, ${prov}, Spain`, viewbox: '' },
    { q: top + ', Spain', viewbox: '' },
  ].filter((v, i, a) => a.findIndex(x => x.q === v.q && x.viewbox === v.viewbox) === i);
}

async function buscar(lugar) {
  const queries = generarQueries(lugar);
  for (const { q, viewbox } of queries) {
    try {
      await sleep(400);
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=es${viewbox}`;
      const res = await fetch(url, { headers: { 'User-Agent': 'Nudisol/1.0 (nudisol.app)' } });
      const data = await res.json();
      if (data?.length > 0) {
        const lat = parseFloat(data[0].lat);
        const lng = parseFloat(data[0].lon);
        if (lat >= 27.5 && lat <= 44 && lng >= -18.5 && lng <= 5) {
          return { lat, lng, query: q };
        }
      }
    } catch(e) {}
  }
  return null;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

window.detener = () => { parar = true; log('⏹ Detenido.', 'info'); document.getElementById('btn-stop').disabled = true; };

window.iniciar = async () => {
  parar = false;
  let stats = { ok: 0, no: 0, err: 0 };
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  document.getElementById('barra-wrap').style.display = 'block';
  document.getElementById('resumen').style.display = 'none';

  log('📦 Cargando lugares sin coords_fuente...', 'info');
  let lugares = [];
  try {
    const snap = await getDocs(collection(db, 'lugares'));
    snap.forEach(d => { const data = d.data(); if (!data.coords_fuente) lugares.push({ id: d.id, ...data }); });
  } catch(e) { log('❌ ' + e.message, 'err'); return; }

  log(`📍 ${lugares.length} pendientes. Iniciando v3...`, 'info');
  log(`⏱️ ~${Math.round(lugares.length * 2 / 60)} minutos estimados`, 'info');

  for (let i = 0; i < lugares.length; i++) {
    if (parar) break;
    const lugar = lugares[i];
    const pct = Math.round((i+1) / lugares.length * 100);
    document.getElementById('barra').style.width = pct + '%';
    document.getElementById('pct').textContent = `${i+1}/${lugares.length} (${pct}%) — ✅ ${stats.ok} · ⚠️ ${stats.no} · ❌ ${stats.err}`;

    try {
      const r = await buscar(lugar);
      if (r) {
        await updateDoc(doc(db, 'lugares', lugar.id), { lat: r.lat, lng: r.lng, coords_fuente: 'nominatim_v3', coords_query: r.query });
        log(`✅ ${lugar.nombre} → ${r.lat.toFixed(4)}, ${r.lng.toFixed(4)}`, 'ok');
        stats.ok++;
      } else {
        log(`⚠️ ${lugar.nombre} (${lugar.provincia})`, 'info');
        stats.no++;
      }
    } catch(e) { log(`❌ ${lugar.nombre} — ${e.message}`, 'err'); stats.err++; }

    await sleep(700);
  }

  const resEl = document.getElementById('resumen');
  resEl.style.display = 'block';
  resEl.innerHTML = `🎉 <strong>v3 completada</strong><br>✅ ${stats.ok} corregidos<br>⚠️ ${stats.no} sin encontrar<br>❌ ${stats.err} errores`;
  log(`\n🎉 v3 FIN: ${stats.ok} corregidos, ${stats.no} sin encontrar.`, 'info');
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
};

function log(msg, tipo = '') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = tipo; d.textContent = msg;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}

onAuthStateChanged(auth, u => {
  if (!u) log('❌ Inicia sesión como admin.', 'err');
  else log(`✅ Conectado como ${u.email}`, 'ok');
});
</script>

</html>
