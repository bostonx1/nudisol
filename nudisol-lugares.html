<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nudisol — Lugares Naturistas</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<meta name="theme-color" content="#0D3D42">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyB3jsPPuKLPEj3B3y-PsIpXCyZXHxY81aQ",
    authDomain: "nudisol.firebaseapp.com",
    projectId: "nudisol",
    storageBucket: "nudisol.firebasestorage.app",
    messagingSenderId: "222881387953",
    appId: "1:222881387953:web:4299a66c2dcb6b5c941990"
  });

  const db = getFirestore(app);
  let todosLosLugares = [];
  let mapaInstancia = null;
  let marcadores = [];

  async function cargarTodos() {
    try {
      const snap = await getDocs(collection(db, 'lugares'));
      snap.forEach(d => todosLosLugares.push({ id: d.id, ...d.data() }));
      todosLosLugares.sort((a, b) => a.nombre.localeCompare(b.nombre, 'es', { sensitivity: 'base' }));
      poblarProvincias();
    } catch(e) {
      console.error('Error:', e);
    }
  }

  function poblarProvincias() {
    // ✅ CORRECCIÓN: localeCompare con locale 'es' para orden alfabético español correcto
    // Álava → entre A y B, Ávila → entre A y B, Málaga → entre M y N
    const provincias = [...new Set(todosLosLugares.map(l => l.provincia))]
      .filter(Boolean)
      .sort((a, b) => a.localeCompare(b, 'es', { sensitivity: 'base' }));

    const select = document.getElementById('select-provincia');
    select.innerHTML = '<option value="">Selecciona una provincia...</option>';
    provincias.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      select.appendChild(opt);
    });
  }

  window.seleccionarProvincia = (provincia) => {
    if (!provincia) {
      document.getElementById('vista-lugares').style.display = 'none';
      document.getElementById('placeholder').style.display = 'flex';
      return;
    }
    const lugares = todosLosLugares.filter(l => l.provincia === provincia);
    document.getElementById('provincia-titulo').textContent = provincia;
    document.getElementById('provincia-count').textContent = `${lugares.length} lugar${lugares.length !== 1 ? 'es' : ''}`;
    renderLugares(lugares);
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('vista-lugares').style.display = 'block';
    iniciarMapa(lugares);
  };

  function renderLugares(lugares) {
    const container = document.getElementById('lista-lugares');
    container.innerHTML = lugares.map(l => `
      <div class="lugar-item" onclick="abrirLugar('${l.id}')">
        <div class="lugar-cat-dot" style="background:${catColor(l.categoria)};"></div>
        <div class="lugar-info">
          <div class="lugar-nombre">${l.nombre}</div>
          <div class="lugar-cat">${catIcono(l.categoria)} ${l.categoria}</div>
        </div>
        <div class="lugar-arrow">›</div>
      </div>
    `).join('');
  }

  function iniciarMapa(lugares) {
    const mapEl = document.getElementById('mapa-provincia');
    if (!mapEl) return;

    if (mapaInstancia) {
      mapaInstancia.remove();
      mapaInstancia = null;
    }

    const validos = lugares.filter(l => l.lat && l.lng);
    if (validos.length === 0) return;

    const centerLat = validos.reduce((s, l) => s + l.lat, 0) / validos.length;
    const centerLng = validos.reduce((s, l) => s + l.lng, 0) / validos.length;

    mapaInstancia = L.map('mapa-provincia', { zoomControl: true }).setView([centerLat, centerLng], 9);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(mapaInstancia);

    marcadores = [];
    validos.forEach(l => {
      const color = catColor(l.categoria);
      const icono = L.divIcon({
        html: `<div style="background:${color};color:white;border-radius:20px;padding:4px 10px;font-size:11px;font-family:Syne,sans-serif;font-weight:700;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.25);border:2px solid rgba(255,255,255,0.4);">${catIcono(l.categoria)} ${l.nombre}</div>`,
        className: '', iconAnchor: [60, 16], iconSize: null
      });
      const m = L.marker([l.lat, l.lng], { icon: icono }).addTo(mapaInstancia);
      m.on('click', () => abrirFicha(l));
      marcadores.push({ id: l.id, marker: m });
    });

    if (validos.length > 1) {
      const bounds = L.latLngBounds(validos.map(l => [l.lat, l.lng]));
      mapaInstancia.fitBounds(bounds, { padding: [30, 30] });
    }
  }

  window.abrirLugar = (id) => {
    const lugar = todosLosLugares.find(l => l.id === id);
    if (!lugar) return;
    abrirFicha(lugar);
    if (mapaInstancia && lugar.lat && lugar.lng) {
      mapaInstancia.setView([lugar.lat, lugar.lng], 13);
      document.getElementById('mapa-provincia').scrollIntoView({ behavior: 'smooth' });
    }
  };

  window.abrirFicha = (lugar) => {
    document.getElementById('ficha-nombre').textContent = lugar.nombre;
    document.getElementById('ficha-cat').textContent = `${catIcono(lugar.categoria)} ${lugar.categoria}`;
    document.getElementById('ficha-cat').style.background = catColor(lugar.categoria) + '20';
    document.getElementById('ficha-cat').style.color = catColor(lugar.categoria);
    document.getElementById('ficha-provincia').textContent = `📍 ${lugar.provincia}, ${lugar.comunidad || ''}`;
    document.getElementById('ficha-desc').textContent = lugar.descripcion || 'Sin descripción disponible.';

    const btnNav = document.getElementById('btn-navegar');
    if (lugar.lat && lugar.lng) {
      btnNav.onclick = () => {
        const url = `https://www.google.com/maps/dir/?api=1&destination=${lugar.lat},${lugar.lng}&travelmode=driving`;
        window.open(url, '_blank');
      };
      btnNav.style.display = 'flex';
    } else {
      btnNav.style.display = 'none';
    }

    const btnMapa = document.getElementById('btn-ver-mapa');
    btnMapa.onclick = () => {
      cerrarFicha();
      if (mapaInstancia && lugar.lat && lugar.lng) {
        mapaInstancia.setView([lugar.lat, lugar.lng], 14);
      }
    };

    const btnWeb = document.getElementById('btn-web');
    if (lugar.web) {
      btnWeb.href = lugar.web;
      btnWeb.style.display = 'flex';
    } else {
      btnWeb.style.display = 'none';
    }

    const btnTel = document.getElementById('btn-tel');
    if (lugar.telefono) {
      btnTel.href = `tel:${lugar.telefono}`;
      btnTel.textContent = `📞 ${lugar.telefono}`;
      btnTel.style.display = 'flex';
    } else {
      btnTel.style.display = 'none';
    }

    document.getElementById('ficha-overlay').style.display = 'flex';
  };

  window.cerrarFicha = () => {
    document.getElementById('ficha-overlay').style.display = 'none';
  };

  function catColor(cat) {
    const map = {
      'Playa / Cala': '#1A6B72',
      'Paraje natural': '#2D6A4F',
      'Camping': '#E8A020',
      'Alojamiento / Resort': '#D45F3C',
      'Piscina / Spa': '#6B4F9E',
      'Club / Asociación': '#C00',
      'Urbanización': '#4A4A4A',
    };
    return map[cat] || '#1A6B72';
  }

  function catIcono(cat) {
    const map = {
      'Playa / Cala': '🏖️',
      'Paraje natural': '🌲',
      'Camping': '🏕️',
      'Alojamiento / Resort': '🏨',
      'Piscina / Spa': '🏊',
      'Club / Asociación': '🎭',
      'Urbanización': '🏘️',
    };
    return map[cat] || '📍';
  }

  window.addEventListener('load', cargarTodos);
</script>

<style>
  :root {
    --ocean: #0D3D42; --teal: #1A6B72; --coral: #D45F3C;
    --sun: #F5C840; --sand: #F5EFE3; --white: #FDFAF5;
    --text: #1A1A1A; --muted: #8A8A8A; --border: #E5E0D8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--sand); min-height: 100vh; display: flex; flex-direction: column; }

  .header { background: var(--ocean); padding: 18px 16px 24px; position: relative; overflow: hidden; flex-shrink: 0; }
  .header::before { content: ''; position: absolute; top: -60px; right: -60px; width: 180px; height: 180px; background: radial-gradient(circle, rgba(245,200,64,0.15) 0%, transparent 70%); border-radius: 50%; }
  .header-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .back-btn { background: none; border: none; color: rgba(255,255,255,0.6); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; }
  .logo-small { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: white; }
  .logo-small span { color: var(--sun); }
  .page-titulo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: white; margin-bottom: 14px; }

  .select-wrap { position: relative; }
  .select-provincia {
    width: 100%; background: rgba(255,255,255,0.12); border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 14px; padding: 13px 16px; font-size: 15px; color: white;
    font-family: 'DM Sans', sans-serif; outline: none; appearance: none;
    cursor: pointer;
  }
  .select-provincia option { color: var(--text); background: white; }
  .select-arrow { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); pointer-events: none; font-size: 18px; }

  .leyenda { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .leyenda-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,0.6); font-family: 'Space Grotesk', sans-serif; }
  .leyenda-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .wave { display: block; width: 100%; flex-shrink: 0; }

  .main { flex: 1; padding: 0 14px 100px; }

  #placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; text-align: center; }
  .placeholder-icon { font-size: 56px; margin-bottom: 16px; }
  .placeholder-titulo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--ocean); margin-bottom: 8px; }
  .placeholder-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }

  #vista-lugares { display: none; }

  .provincia-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 10px; }
  .provincia-nombre { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; color: var(--ocean); }
  .provincia-count { font-size: 12px; color: var(--muted); font-family: 'Space Grotesk', sans-serif; font-weight: 700; }

  .mapa-wrap { border-radius: 20px; overflow: hidden; height: 280px; margin-bottom: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
  #mapa-provincia { height: 100%; width: 100%; }

  .lista-wrap { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.07); margin-bottom: 16px; }
  .lugar-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
  .lugar-item:last-child { border-bottom: none; }
  .lugar-item:active { background: #f5f0ea; }
  .lugar-cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .lugar-info { flex: 1; }
  .lugar-nombre { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; color: var(--ocean); margin-bottom: 2px; }
  .lugar-cat { font-size: 11px; color: var(--muted); }
  .lugar-arrow { color: var(--muted); font-size: 18px; }

  .ficha-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: flex-end; justify-content: center; }
  .ficha-box { background: white; border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; padding: 20px; max-height: 85vh; overflow-y: auto; }
  .ficha-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .ficha-cat-badge { display: inline-block; border-radius: 10px; padding: 4px 12px; font-size: 12px; font-family: 'Syne', sans-serif; font-weight: 700; margin-bottom: 10px; }
  .ficha-nombre { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: var(--ocean); margin-bottom: 6px; line-height: 1.2; }
  .ficha-provincia { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .ficha-desc { font-size: 14px; color: #3A3A3A; line-height: 1.6; margin-bottom: 18px; }
  .ficha-btns { display: flex; flex-direction: column; gap: 10px; }
  .btn-navegar {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--coral); color: white; border: none; border-radius: 14px;
    padding: 15px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
    cursor: pointer; text-decoration: none;
  }
  .btn-ver-mapa {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--ocean); color: white; border: none; border-radius: 14px;
    padding: 13px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px;
    cursor: pointer;
  }
  .btn-secundario {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: var(--sand); color: var(--ocean); border: none; border-radius: 14px;
    padding: 12px; font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px;
    cursor: pointer; text-decoration: none;
  }
  .btn-cerrar-ficha { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; text-align: center; margin-top: 4px; font-family: 'Syne', sans-serif; font-weight: 700; }

  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid rgba(0,0,0,0.07); display: flex; padding: 8px 0 max(12px, env(safe-area-inset-bottom)); z-index: 100; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; color: var(--muted); text-decoration: none; cursor: pointer; background: none; border: none; opacity: 0.45; }
  .nav-item.active { opacity: 1; }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 9px; font-family: 'Space Grotesk', sans-serif; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; color: var(--ocean); }
  .nav-item.active .nav-label { color: var(--coral); }
</style>
</head>
<body>

<div class="header">
  <div class="header-nav">
    <button class="back-btn" onclick="window.location.href='nudisol-home.html'">← Inicio</button>
    <div class="logo-small">nudi<span>sol</span></div>
    <div style="width:60px;"></div>
  </div>
  <div class="page-titulo">🌿 Lugares naturistas</div>
  <div class="select-wrap">
    <select class="select-provincia" id="select-provincia" onchange="seleccionarProvincia(this.value)">
      <option value="">Selecciona una provincia...</option>
    </select>
    <div class="select-arrow">▾</div>
  </div>
  <div class="leyenda">
    <div class="leyenda-item"><div class="leyenda-dot" style="background:#1A6B72;"></div>Playa / Cala</div>
    <div class="leyenda-item"><div class="leyenda-dot" style="background:#2D6A4F;"></div>Paraje</div>
    <div class="leyenda-item"><div class="leyenda-dot" style="background:#E8A020;"></div>Camping</div>
    <div class="leyenda-item"><div class="leyenda-dot" style="background:#D45F3C;"></div>Alojamiento</div>
    <div class="leyenda-item"><div class="leyenda-dot" style="background:#6B4F9E;"></div>Piscina / Spa</div>
    <div class="leyenda-item"><div class="leyenda-dot" style="background:#C00;"></div>Club</div>
    <div class="leyenda-item"><div class="leyenda-dot" style="background:#4A4A4A;"></div>Urbanización</div>
  </div>
</div>

<svg class="wave" viewBox="0 0 390 24" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <path d="M0 24 L0 12 Q30 0 60 10 Q90 20 120 8 Q150 0 180 10 Q210 20 240 8 Q270 0 300 10 Q330 20 360 8 Q375 4 390 8 L390 24 Z" fill="#F5EFE3"/>
</svg>

<div class="main">
  <div id="placeholder">
    <div class="placeholder-icon">🗺️</div>
    <div class="placeholder-titulo">Elige una provincia</div>
    <div class="placeholder-sub">Selecciona una provincia para ver todos los lugares naturistas disponibles con su ubicación en el mapa.</div>
  </div>

  <div id="vista-lugares">
    <div class="provincia-header">
      <div class="provincia-nombre" id="provincia-titulo">—</div>
      <div class="provincia-count" id="provincia-count">—</div>
    </div>
    <div class="mapa-wrap">
      <div id="mapa-provincia"></div>
    </div>
    <div class="lista-wrap">
      <div id="lista-lugares"></div>
    </div>
  </div>
</div>

<div class="ficha-overlay" id="ficha-overlay" onclick="if(event.target===this)cerrarFicha()">
  <div class="ficha-box">
    <div class="ficha-handle"></div>
    <div class="ficha-cat-badge" id="ficha-cat"></div>
    <div class="ficha-nombre" id="ficha-nombre"></div>
    <div class="ficha-provincia" id="ficha-provincia"></div>
    <div class="ficha-desc" id="ficha-desc"></div>
    <div class="ficha-btns">
      <button class="btn-navegar" id="btn-navegar">🚗 Cómo llegar — Google Maps</button>
      <button class="btn-ver-mapa" id="btn-ver-mapa">🗺️ Ver en el mapa</button>
      <a class="btn-secundario" id="btn-web" href="#" target="_blank">🌐 Ver web oficial</a>
      <a class="btn-secundario" id="btn-tel" href="#" style="display:none;">📞 Llamar</a>
      <button class="btn-cerrar-ficha" onclick="cerrarFicha()">Cerrar</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item" onclick="window.location.href='nudisol-home.html'">
    <span class="nav-icon">🏠</span><span class="nav-label">Inicio</span>
  </button>
  <button class="nav-item" onclick="window.location.href='nudisol-mapa.html'">
    <span class="nav-icon">🗺️</span><span class="nav-label">Mapa</span>
  </button>
  <button class="nav-item active">
    <span class="nav-icon">🌿</span><span class="nav-label">Lugares</span>
  </button>
  <button class="nav-item" onclick="window.location.href='nudisol-comunidad.html'">
    <span class="nav-icon">💬</span><span class="nav-label">Comunidad</span>
  </button>
  <button class="nav-item" onclick="window.location.href='nudisol-perfil.html'">
    <span class="nav-icon">👤</span><span class="nav-label">Perfil</span>
  </button>
</nav>

<script>
if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js");
</script>
</body>
</html>
