<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nudisol — Importar Lote 42</title>
<style>
  body { font-family: monospace; background: #0D3D42; color: white; padding: 20px; }
  h2 { color: #F5C840; margin-bottom: 10px; }
  #log { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 16px; height: 400px; overflow-y: auto; font-size: 13px; line-height: 1.6; }
  .ok { color: #4ADE80; } .err { color: #F87171; } .info { color: #F5C840; }
  button { background: #D45F3C; color: white; border: none; border-radius: 10px; padding: 12px 28px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 16px; }
  button:disabled { opacity: 0.5; }
  #resumen { margin-top: 12px; font-size: 14px; color: #F5C840; }
</style>
</head>
<body>
<h2>🌿 Nudisol — Importador Lote 42 — Huelva completo + últimas zonas</h2>
<button id="btn" onclick="importar()">🚀 Importar lote 42</button>
<div id="resumen"></div>
<div id="log"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyB3jsPPuKLPEj3B3y-PsIpXCyZXHxY81aQ",
  authDomain: "nudisol.firebaseapp.com",
  projectId: "nudisol",
  storageBucket: "nudisol.firebasestorage.app",
  messagingSenderId: "222881387953",
  appId: "1:222881387953:web:4299a66c2dcb6b5c941990"
});

const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, user => {
  if (!user) { log('❌ Inicia sesión como admin.', 'err'); document.getElementById('btn').disabled = true; }
  else log(`✅ Conectado como ${user.email}`, 'ok');
});

const lugares = [
  // ── HUELVA — DOÑANA / ALMONTE ─────────────────────────────────
  { nombre: 'Playa de Castilla — Doñana', categoria: 'Playa / Cala', provincia: 'Huelva', comunidad: 'Andalucía', lat: 37.058, lng: -6.656, descripcion: 'Playa nudista de 20 km en el Parque Nacional de Doñana, Almonte. Acantilados de arena y dimensiones inmensas. Solo acceso por puntos señalizados. Paraíso para naturistas amantes de Doñana.' },
  { nombre: 'Playa El Asperillo — Matalascañas', categoria: 'Playa / Cala', provincia: 'Huelva', comunidad: 'Andalucía', lat: 37.082, lng: -6.723, descripcion: 'Playa nudista virgen entre Mazagón y Matalascañas. Dunas fósiles únicas en Europa. Junto a Cuesta Maneli. Gran atractivo para naturistas. Parque Nacional de Doñana.' },
  { nombre: 'Playa El Parador — Moguer', categoria: 'Playa / Cala', provincia: 'Huelva', comunidad: 'Andalucía', lat: 37.128, lng: -6.798, descripcion: 'Playa nudista de 2.500m en Moguer. Bandera Azul. Arena dorada fina. Una de las playas más valoradas de la costa onubense para naturismo.' },
  { nombre: 'Playa Torre del Loro — Moguer', categoria: 'Playa / Cala', provincia: 'Huelva', comunidad: 'Andalucía', lat: 37.138, lng: -6.812, descripcion: 'Playa nudista en Moguer, compartida con Palos de la Frontera. Entorno virgen entre Mazagón y la desembocadura del Odiel.' },
  { nombre: 'Playa La Estrella — Arroyo Julianejo', categoria: 'Playa / Cala', provincia: 'Huelva', comunidad: 'Andalucía', lat: 37.112, lng: -6.768, descripcion: 'Playa nudista de 3.000m en Moguer. Entorno virgen de la costa onubense. Nudismo habitual en la zona más alejada.' },

  // ── HUELVA — CARTAYA / LEPE ────────────────────────────────────
  { nombre: 'Playa de Caño de la Culata — Cartaya', categoria: 'Playa / Cala', provincia: 'Huelva', comunidad: 'Andalucía', lat: 37.178, lng: -7.049, descripcion: 'Playa nudista de 2.145m en Cartaya, junto a Nuevo Portil. Desembocadura fluvial donde caños y pinares se funden con el océano. Aguas tranquilas.' },
  { nombre: 'Playa Santa Pura — Lepe', categoria: 'Playa / Cala', provincia: 'Huelva', comunidad: 'Andalucía', lat: 37.184, lng: -7.061, descripcion: 'Playa nudista de 2.250m en Lepe. Bandera Azul. Arena fina dorada de la Costa de la Luz onubense.' },

  // ── HUELVA — AYAMONTE ──────────────────────────────────────────
  { nombre: 'Playa de Los Haraganes — Ayamonte', categoria: 'Playa / Cala', provincia: 'Huelva', comunidad: 'Andalucía', lat: 37.197, lng: -7.385, descripcion: 'Playa nudista de 1.500m en Ayamonte. Arena fina dorada. Nudismo habitual en el extremo más alejado.' },
  { nombre: 'Playa de Isla Canela — zona natural', categoria: 'Playa / Cala', provincia: 'Huelva', comunidad: 'Andalucía', lat: 37.199, lng: -7.394, descripcion: 'Zona nudista en Isla Canela, Ayamonte. Complejo turístico en el límite con Portugal. Espacios aislados rodeados de vegetación dunar.' },

  // ── ÚLTIMAS ZONAS INTERIOR PENDIENTES ─────────────────────────
  { nombre: 'Río Tinto — pozas naturistas', categoria: 'Paraje natural', provincia: 'Huelva', comunidad: 'Andalucía', lat: 37.691, lng: -6.558, descripcion: 'Zona naturista en el Río Tinto, Huelva interior. Aguas rojizas características por minerales. Entorno minero único en el mundo.' },
  { nombre: 'Embalse de Aracena — naturismo', categoria: 'Paraje natural', provincia: 'Huelva', comunidad: 'Andalucía', lat: 37.900, lng: -6.550, descripcion: 'Zona nudista en el Embalse de Aracena, Sierra de Aracena, Huelva. Aguas frescas de montaña en entorno de castaños y encinas.' },

  // ── CASTELLÓN — MÁS PENDIENTES ────────────────────────────────
  { nombre: 'Cala Sol de Riu — Vinaròs', categoria: 'Playa / Cala', provincia: 'Castellón', comunidad: 'Comunidad Valenciana', lat: 40.473, lng: 0.465, descripcion: 'Playa nudista aislada en el extremo norte de Castellón, Vinaròs. Arena dorada. La más septentrional de la Costa Azahar.' },
  { nombre: 'Playa Els Serrans — Alcalà de Xivert', categoria: 'Playa / Cala', provincia: 'Castellón', comunidad: 'Comunidad Valenciana', lat: 40.312, lng: 0.315, descripcion: 'Playa nudista tranquila en Alcalà de Xivert, Castellón. Rodeada de dunas. Costa Azahar. Una de las zonas con más tradición naturista de Castellón.' },
  { nombre: 'Els Cossis — Oropesa del Mar', categoria: 'Playa / Cala', provincia: 'Castellón', comunidad: 'Comunidad Valenciana', lat: 40.062, lng: 0.131, descripcion: 'Zona nudista en Oropesa del Mar, Castellón. Playa natural en la Costa Azahar.' },
  { nombre: 'El Pebret — Peñíscola', categoria: 'Playa / Cala', provincia: 'Castellón', comunidad: 'Comunidad Valenciana', lat: 40.348, lng: 0.383, descripcion: 'Zona nudista en Peñíscola, Castellón. Playa natural en el extremo sur del término municipal.' },

  // ── ASTURIAS — ÚLTIMAS ────────────────────────────────────────
  { nombre: 'Playa de La Franca — Ribadedeva', categoria: 'Playa / Cala', provincia: 'Asturias', comunidad: 'Asturias', lat: 43.388, lng: -4.554, descripcion: 'Playa nudista en Ribadedeva, Asturias oriental. Formaciones rocosas características y entorno verde. Zona nudista en el extremo más alejado.' },
  { nombre: 'Playa de Gulpiyuri — zona naturista', categoria: 'Paraje natural', provincia: 'Asturias', comunidad: 'Asturias', lat: 43.400, lng: -4.802, descripcion: 'Zona naturista junto a la famosa Playa de Gulpiyuri, Naves, Llanes. La playa más curiosa de España: interior, llega el agua por grietas naturales. Nudismo en entorno único.' },

  // ── BARCELONA — ÚLTIMAS ───────────────────────────────────────
  { nombre: 'Playa del Garraf — zona nudista', categoria: 'Playa / Cala', provincia: 'Barcelona', comunidad: 'Cataluña', lat: 41.270, lng: 1.877, descripcion: 'Zona nudista en Playa del Garraf, Sitges. Playa semiurbana de la Costa del Garraf con zona naturista en el extremo norte.' },
  { nombre: 'Platja de Gavà — zona nudista', categoria: 'Playa / Cala', provincia: 'Barcelona', comunidad: 'Cataluña', lat: 41.284, lng: 2.003, descripcion: 'Zona nudista en Playa de Gavà. Extensa playa del Baix Llobregat con Espacio de Interés Natural y zona naturista habitual.' },

  // ── ÚLTIMAS ASOCIACIONES Y CAMPINGS ───────────────────────────
  { nombre: 'Camping Naturista El Portús — Cartagena', categoria: 'Camping', provincia: 'Murcia', comunidad: 'Murcia', lat: 37.584, lng: -0.990, descripcion: 'Camping naturista en El Portús, Cartagena. Acceso directo a la Playa de La Morena. Instalaciones nudistas completas en la Costa Cálida.' },
  { nombre: 'Asociación Naturista de Extremadura', categoria: 'Club / Asociación', provincia: 'Cáceres', comunidad: 'Extremadura', lat: 39.474, lng: -6.372, descripcion: 'Asociación naturista de Extremadura federada a la FEN. Promueve el naturismo en embalses, ríos y parajes naturales de la región extremeña.' },
];

window.importar = async () => {
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = '⏳ Importando...';
  let ok = 0, skip = 0, err = 0;
  log(`📦 Importando ${lugares.length} lugares...`, 'info');
  for (const lugar of lugares) {
    try {
      const q = query(collection(db, 'lugares'), where('nombre', '==', lugar.nombre), where('provincia', '==', lugar.provincia));
      const snap = await getDocs(q);
      if (!snap.empty) { log(`⏭️ Ya existe: ${lugar.nombre}`, 'info'); skip++; continue; }
      await addDoc(collection(db, 'lugares'), { ...lugar, creado: serverTimestamp(), actualizado: serverTimestamp() });
      log(`✅ ${lugar.nombre}`, 'ok');
      ok++;
      await new Promise(r => setTimeout(r, 100));
    } catch(e) { log(`❌ Error: ${lugar.nombre} — ${e.message}`, 'err'); err++; }
  }
  log(`\n🎉 COMPLETADO: ${ok} añadidos, ${skip} ya existían, ${err} errores.`, 'info');
  document.getElementById('resumen').textContent = `✅ ${ok} añadidos | ⏭️ ${skip} ya existían | ❌ ${err} errores`;
  btn.textContent = '✅ Completado';
};

function log(msg, tipo = '') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = tipo; line.textContent = msg;
  el.appendChild(line); el.scrollTop = el.scrollHeight;
}
</script>
</body>
</html>
