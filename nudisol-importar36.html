<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nudisol — Importar Lote 36</title>
<style>
  body { font-family: monospace; background: #0D3D42; color: white; padding: 20px; }
  h2 { color: #F5C840; margin-bottom: 10px; }
  #log { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 16px; height: 400px; overflow-y: auto; font-size: 13px; line-height: 1.6; }
  .ok { color: #4ADE80; } .err { color: #F87171; } .info { color: #F5C840; }
  button { background: #D45F3C; color: white; border: none; border-radius: 10px; padding: 12px 28px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 16px; }
  button:disabled { opacity: 0.5; }
  #resumen { margin-top: 12px; font-size: 14px; color: #F5C840; }
</style>
</head>
<body>
<h2>🌿 Nudisol — Importador Lote 36 — Granada completo + últimas provincias</h2>
<button id="btn" onclick="importar()">🚀 Importar lote 36</button>
<div id="resumen"></div>
<div id="log"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyB3jsPPuKLPEj3B3y-PsIpXCyZXHxY81aQ",
  authDomain: "nudisol.firebaseapp.com",
  projectId: "nudisol",
  storageBucket: "nudisol.firebasestorage.app",
  messagingSenderId: "222881387953",
  appId: "1:222881387953:web:4299a66c2dcb6b5c941990"
});

const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, user => {
  if (!user) { log('❌ Inicia sesión como admin.', 'err'); document.getElementById('btn').disabled = true; }
  else log(`✅ Conectado como ${user.email}`, 'ok');
});

const lugares = [
  // ── GRANADA — COSTA TROPICAL COMPLETO ────────────────────────
  { nombre: 'Playa de Calabajío', categoria: 'Playa / Cala', provincia: 'Granada', comunidad: 'Andalucía', lat: 36.735, lng: -3.738, descripcion: 'Playa nudista en Almuñécar, Costa Tropical. 340m x 40m de arena fina casi negra. Muy fácil acceso desde N-340. Duchas, limpieza, restaurante y alojamiento cercano. Una de las mejores arenas de la costa granadina.' },
  { nombre: 'Playa El Muerto — Almuñécar', categoria: 'Playa / Cala', provincia: 'Granada', comunidad: 'Andalucía', lat: 36.731, lng: -3.730, descripcion: 'Playa nudista oficial en Almuñécar. Cala aislada accesible a pie desde Cotobro. Gay-friendly, referente LGTBI de Granada. Quiosco con vermut casero y comida. Acantilado con el Pico de Águila al fondo.' },
  { nombre: 'Playa de La Rijana', categoria: 'Playa / Cala', provincia: 'Granada', comunidad: 'Andalucía', lat: 36.741, lng: -3.607, descripcion: 'Cala nudista de 250m x 20m en Gualchos-Castell de Ferro, Costa Tropical. Aguas muy transparentes para buceo y snorkel. Gran roca al final para zambullirse. Una de las más fantásticas de la costa granadina.' },
  { nombre: 'Playa La Joya — Torrenueva', categoria: 'Playa / Cala', provincia: 'Granada', comunidad: 'Andalucía', lat: 36.685, lng: -3.490, descripcion: 'Cala nudista en Torrenueva, Motril. Escalera de 500m de bajada. Arena oscura resguardada por acantilados con árboles frutales. Espectacular y sin servicios. Limpieza regular. N-340 costera de Castell de Ferro.' },
  { nombre: 'Playa El Ruso — Albuñol', categoria: 'Playa / Cala', provincia: 'Granada', comunidad: 'Andalucía', lat: 36.741, lng: -3.236, descripcion: 'Playa nudista aislada de arena oscura en Albuñol, extremo oriental de la Costa Tropical. Entre Almería y Granada. Muy poco frecuentada y tranquila.' },
  { nombre: 'Embalse de Negratin — naturismo Granada', categoria: 'Paraje natural', provincia: 'Granada', comunidad: 'Andalucía', lat: 37.615, lng: -2.961, descripcion: 'Zona nudista en el Embalse de Negratin, cerca de Cuevas del Campo, Granada. Playa artificial con nudismo. Una de las pocas opciones naturistas de interior andaluz.' },
  { nombre: 'Playa de Carchuna — zona gay', categoria: 'Playa / Cala', provincia: 'Granada', comunidad: 'Andalucía', lat: 36.671, lng: -3.517, descripcion: 'Playa de 3 km en Motril. Zona frecuentada por la comunidad gay de la Costa Tropical. Ambiente tranquilo pese a la extensión.' },

  // ── ALMERÍA — ÚLTIMAS CALAS PENDIENTES ───────────────────────
  { nombre: 'Playa del Barronal — Cabo de Gata', categoria: 'Playa / Cala', provincia: 'Almería', comunidad: 'Andalucía', lat: 36.748, lng: -2.024, descripcion: 'Playa nudista en el Parque Natural Cabo de Gata, entre Los Genoveses y Cala Monsul. Acceso por carretera y parada de autobús. Arena dorada, aguas cristalinas. Discreta y perfecta para nudismo.' },
  { nombre: 'Cala San Pedro — Las Negras', categoria: 'Playa / Cala', provincia: 'Almería', comunidad: 'Andalucía', lat: 36.908, lng: -2.047, descripcion: 'Cala nudista mágica en el Parque Natural Cabo de Gata. Solo acceso a pie (45 min) o en kayak. Palmeras, ruinas de un castillo árabe y agua azul turquesa. Una de las más especiales de España.' },
  { nombre: 'Playa de Enmedio — Carboneras', categoria: 'Playa / Cala', provincia: 'Almería', comunidad: 'Andalucía', lat: 37.001, lng: -1.888, descripcion: 'Playa nudista en Carboneras, junto a Playa de los Muertos. Arena blanca y aguas cristalinas del Parque Natural Cabo de Gata. Una de las más salvajes de Almería.' },

  // ── SEVILLA — INTERIOR ────────────────────────────────────────
  { nombre: 'Embalse de Minillas — Sevilla naturista', categoria: 'Paraje natural', provincia: 'Sevilla', comunidad: 'Andalucía', lat: 37.891, lng: -5.434, descripcion: 'Zona nudista en el Embalse de Minillas, Constantina, Sevilla. Aguas del embalse sevillano. Nudismo habitual entre los naturistas de la capital andaluza.' },
  { nombre: 'Río Huéznar — Constantina', categoria: 'Paraje natural', provincia: 'Sevilla', comunidad: 'Andalucía', lat: 37.894, lng: -5.603, descripcion: 'Zona naturista en el Río Huéznar, Parque Natural Sierra Norte de Sevilla. Pozas naturales en entorno de encinas y alcornoques.' },

  // ── JAÉN — INTERIOR ───────────────────────────────────────────
  { nombre: 'Río Borosa — Cazorla naturista', categoria: 'Paraje natural', provincia: 'Jaén', comunidad: 'Andalucía', lat: 37.902, lng: -2.861, descripcion: 'Zona naturista en el Río Borosa, Parque Natural Sierras de Cazorla, Segura y Las Villas. Pozas de aguas cristalinas en el bosque. El parque natural más grande de España.' },
  { nombre: 'Embalse del Tranco — Cazorla', categoria: 'Paraje natural', provincia: 'Jaén', comunidad: 'Andalucía', lat: 38.076, lng: -2.825, descripcion: 'Zona naturista en el Embalse del Tranco, Cazorla, Jaén. Aguas azules rodeadas de pinos y montañas de la sierra jienense.' },

  // ── CÓRDOBA — INTERIOR ────────────────────────────────────────
  { nombre: 'Embalse de Iznájar — naturismo Córdoba', categoria: 'Paraje natural', provincia: 'Córdoba', comunidad: 'Andalucía', lat: 37.256, lng: -4.308, descripcion: 'Zona nudista en el Embalse de Iznájar, Córdoba. El lago más grande de Andalucía. Playas naturales de arena blanca con nudismo habitual en zonas aisladas.' },

  // ── BADAJOZ — INTERIOR ────────────────────────────────────────
  { nombre: 'Embalse de La Serena — naturismo', categoria: 'Paraje natural', provincia: 'Badajoz', comunidad: 'Extremadura', lat: 38.878, lng: -5.241, descripcion: 'Zona nudista en el Embalse de La Serena, mayor embalse de España, Badajoz. Playas de arena blanca natural donde el nudismo es habitual en los rincones más alejados.' },
  { nombre: 'Río Guadiana — Mérida naturista', categoria: 'Paraje natural', provincia: 'Badajoz', comunidad: 'Extremadura', lat: 38.917, lng: -6.341, descripcion: 'Zona naturista en el Río Guadiana a su paso por Mérida. Zonas aisladas de la ribera donde el nudismo es habitual entre los emeritenses.' },

  // ── ÚLTIMAS CALAS IBIZA ───────────────────────────────────────
  { nombre: 'Cala de S\'Aigua Blanca — Ibiza', categoria: 'Playa / Cala', provincia: 'Ibiza', comunidad: 'Baleares', lat: 39.071, lng: 1.614, descripcion: 'Cala nudista aislada de arena dorada en Santa Eulalia del Río, Ibiza. Aguas cristalinas del norte de la isla. Acceso a pie.' },
  { nombre: 'Cala Tarida — Ibiza', categoria: 'Playa / Cala', provincia: 'Ibiza', comunidad: 'Baleares', lat: 38.953, lng: 1.230, descripcion: 'Zona nudista en Cala Tarida, Sant Josep de sa Talaia, Ibiza. Playa semiurbana con zonas naturistas. Arena dorada y aguas cristalinas del oeste de la isla.' },
];

window.importar = async () => {
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = '⏳ Importando...';
  let ok = 0, skip = 0, err = 0;
  log(`📦 Importando ${lugares.length} lugares...`, 'info');
  for (const lugar of lugares) {
    try {
      const q = query(collection(db, 'lugares'), where('nombre', '==', lugar.nombre), where('provincia', '==', lugar.provincia));
      const snap = await getDocs(q);
      if (!snap.empty) { log(`⏭️ Ya existe: ${lugar.nombre}`, 'info'); skip++; continue; }
      await addDoc(collection(db, 'lugares'), { ...lugar, creado: serverTimestamp(), actualizado: serverTimestamp() });
      log(`✅ ${lugar.nombre}`, 'ok');
      ok++;
      await new Promise(r => setTimeout(r, 100));
    } catch(e) { log(`❌ Error: ${lugar.nombre} — ${e.message}`, 'err'); err++; }
  }
  log(`\n🎉 COMPLETADO: ${ok} añadidos, ${skip} ya existían, ${err} errores.`, 'info');
  document.getElementById('resumen').textContent = `✅ ${ok} añadidos | ⏭️ ${skip} ya existían | ❌ ${err} errores`;
  btn.textContent = '✅ Completado';
};

function log(msg, tipo = '') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = tipo; line.textContent = msg;
  el.appendChild(line); el.scrollTop = el.scrollHeight;
}
</script>
</body>
</html>
