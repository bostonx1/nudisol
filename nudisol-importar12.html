const db = getFirestore(app);

onAuthStateChanged(auth, user => {
  if (!user) { log('❌ Inicia sesión como admin.', 'err'); document.getElementById('btn').disabled = true; }

  { nombre: 'Embalse de Linares del Arroyo', categoria: 'Paraje natural', provincia: 'Segovia', comunidad: 'Castilla y León', lat: 41.417, lng: -3.617, descripcion: 'Zona naturista en el Embalse de Linares del Arroyo, Maderuelo. Aguas cálidas en verano y paisaje interior castellano.' },

  // ── CÁCERES — MÁS PARAJES ────────────────────────────────────
  { nombre: 'Río Árrago — Hernán-Pérez', categoria: 'Paraje natural', provincia: 'Cáceres', comunidad: 'Extremadura', lat: 40.173, lng: -6.521, descripcion: 'Zona naturista en el Río Árrago, cerca de Hernán-Pérez. Aguas cristalinas y entorno de dehesa extremeña.' },
  { nombre: 'Embalse de Gabriel y Galán', categoria: 'Paraje natural', provincia: 'Cáceres', comunidad: 'Extremadura', lat: 40.196, lng: -6.078, descripcion: 'Zona naturista en el Embalse de Gabriel y Galán. Aguas cálidas en verano, uno de los embalses más grandes de Extremadura.' },

  { nombre: 'Pantano de Barcena', categoria: 'Paraje natural', provincia: 'León', comunidad: 'Castilla y León', lat: 42.601, lng: -6.521, descripcion: 'Zona naturista en el Pantano de Bárcena, Cubillos del Sil-Ponferrada. Aguas tranquilas del Bierzo leonés.' },
  { nombre: 'Pantano de Matalavilla', categoria: 'Paraje natural', provincia: 'León', comunidad: 'Castilla y León', lat: 42.817, lng: -6.398, descripcion: 'Zona naturista en el Pantano de Matalavilla, El Bierzo. Entorno de montaña leonesa y aguas frescas.' },
  { nombre: 'Río Torío — Vegacervera', categoria: 'Paraje natural', provincia: 'León', comunidad: 'Castilla y León', lat: 42.851, lng: -5.531, descripcion: 'Zona naturista en el Río Torío, Vegacervera. Pozas naturales en el Valle de Vegacervera.' },

  { nombre: 'Cala en Turqueta', categoria: 'Playa / Cala', provincia: 'Baleares', comunidad: 'Baleares', lat: 39.932, lng: 3.821, descripcion: 'Cala nudista en Ciutadella, Menorca. Aguas turquesas y arena blanca. Acceso a pie por camino señalizado.' },

  { nombre: 'Cala en Baster', categoria: 'Playa / Cala', provincia: 'Baleares', comunidad: 'Baleares', lat: 38.718, lng: 1.453, descripcion: 'Cala nudista en Formentera. Pequeña y tranquila, aguas cristalinas.' },

  // ── BARCELONA — SPA NUDISTA ───────────────────────────────────
  { nombre: 'ZT Hotels Spa nudista — Barcelona', categoria: 'Piscina / Spa', provincia: 'Barcelona', comunidad: 'Cataluña', lat: 41.387, lng: 2.170, descripcion: 'Spa nudista en Barcelona organizado por la asociación DxN. Sesiones mensuales. Reserva por email: minoshvo@zthotels.com.' },
  { nombre: 'Serena Spa — Hotel Meliá Sarrià', categoria: 'Piscina / Spa', provincia: 'Barcelona', comunidad: 'Cataluña', lat: 41.392, lng: 2.128, descripcion: 'Spa nudista en el Hotel Meliá Sarrià, Barcelona. Sesiones mensuales organizadas por DxN. Reserva: spameliasarria@spaserena.com.' },

  // ── LLEIDA — INTERIOR ─────────────────────────────────────────
  { nombre: 'Río Noguera Pallaresa — zona naturista', categoria: 'Paraje natural', provincia: 'Lleida', comunidad: 'Cataluña', lat: 42.387, lng: 0.891, descripcion: 'Zona naturista en el Río Noguera Pallaresa, Lleida. Pozas naturales en el Pirineo catalán, aguas cristalinas y entorno montañoso.' },
];

window.importar = async () => {
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = '⏳ Importando...';
  let ok = 0, skip = 0, err = 0;
  log(`📦 Importando ${lugares.length} lugares...`, 'info');
  for (const lugar of lugares) {
    try {
      const q = query(collection(db, 'lugares'), where('nombre', '==', lugar.nombre), where('provincia', '==', lugar.provincia));
      const snap = await getDocs(q);
      if (!snap.empty) { log(`⏭️ Ya existe: ${lugar.nombre}`, 'info'); skip++; continue; }
      await addDoc(collection(db, 'lugares'), { ...lugar, creado: serverTimestamp(), actualizado: serverTimestamp() });
      log(`✅ ${lugar.nombre}`, 'ok');
      ok++;
      await new Promise(r => setTimeout(r, 100));
    } catch(e) { log(`❌ Error: ${lugar.nombre} — ${e.message}`, 'err'); err++; }
  }
  log(`\n🎉 COMPLETADO: ${ok} añadidos, ${skip} ya existían, ${err} errores.`, 'info');
  document.getElementById('resumen').textContent = `✅ ${ok} añadidos | ⏭️ ${skip} ya existían | ❌ ${err} errores`;
  btn.textContent = '✅ Completado';
};

function log(msg, tipo = '') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = tipo; line.textContent = msg;
  el.appendChild(line); el.scrollTop = el.scrollHeight;
}
</script>
</body>
</html>
