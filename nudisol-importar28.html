  { nombre: 'Playa El Pozo — La Cruz', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 28.851, lng: -13.790, descripcion: 'Cala nudista en Yaiza. También conocida como Playa La Cruz. Arena blanca aislada en los Ajaches. Acceso a pie.' },
  { nombre: 'Playa El Cohon', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 28.849, lng: -13.792, descripcion: 'Playa nudista aislada de arena oscura volcánica en Yaiza. Dentro del Monumento Natural de los Ajaches.' },

  { nombre: 'Playa Montaña Bermeja', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 28.844, lng: -13.786, descripcion: 'Playa nudista aislada de arena oscura en Yaiza. Bajo la Montaña Bermeja, dentro del Monumento Natural de los Ajaches.' },
  { nombre: 'Caleta de San Marcial', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 28.843, lng: -13.783, descripcion: 'Cala nudista de arena blanca en Yaiza. Una de las más vírgenes del sur de Lanzarote.' },
  { nombre: 'Caleta del Fuego', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 28.841, lng: -13.781, descripcion: 'Cala nudista de arena oscura en Yaiza. Nombre evocador por el entorno volcánico. Aislada y de difícil acceso.' },

  // ── LANZAROTE — NORTE (HARÍA / TEGUISE) ──────────────────────
  { nombre: 'Charco del Palo — urbanización nudista', categoria: 'Urbanización', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 29.091, lng: -13.476, descripcion: 'La única urbanización 100% nudista de Lanzarote, en Teguise/Haría. Piscinas naturales, tiendas, supermercado y vida cotidiana sin ropa. Referente del naturismo canario e internacional.' },
  { nombre: 'Playa de Famara — zona nudista El Papelillo', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 29.087, lng: -13.558, descripcion: '2.800m al pie del Risco de Famara. Zona nudista al final norte llamada El Papelillo. Paraíso del surf y kitesurf. Paisaje lunar incomparable. Bungalows en el pueblo para alojarse.' },
  { nombre: 'Playa Bajo el Risco', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 29.148, lng: -13.526, descripcion: 'La más salvaje y solitaria de Lanzarote. Acceso solo por el Camino de los Gracioseros, ruta de alta dificultad. Cala inhóspita para nudistas en busca de soledad absoluta.' },
  { nombre: 'Caletón Blanco — Órzola', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 29.231, lng: -13.447, descripcion: 'Cala nudista de arena blanca cerca de Órzola, norte de Lanzarote. Piscinas naturales turquesas espectaculares. Muy popular entre los residentes de la isla.' },
  { nombre: 'El Embarcadero — Haría', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 29.214, lng: -13.459, descripcion: 'Playa nudista aislada de arena dorada en Haría. Cerca de Órzola, oculta y tranquila. Una de las más exóticas del norte de la isla. Acceso por LZ-1.' },
  { nombre: 'Caleta González', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 29.201, lng: -13.462, descripcion: 'Cala nudista de arena blanca en Haría. Dentro del Parque Natural del Monumento Nacional de la Corona.' },
  { nombre: 'Caleta de José María', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 29.198, lng: -13.460, descripcion: 'Cala nudista de arena blanca en Haría. Junto a Caleta González, aislada en la costa norte volcánica de Lanzarote.' },
  { nombre: 'Caleta del Mojón', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 29.195, lng: -13.458, descripcion: 'Cala nudista de arena blanca en Haría. Dentro del Monumento Natural de la Corona. Aguas cristalinas del Atlántico norte.' },
  { nombre: 'De Seifio', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 29.192, lng: -13.455, descripcion: 'Playa nudista aislada de arena blanca en Haría. Entorno volcánico único del norte de Lanzarote.' },

  { nombre: 'Caleta de Arriba — Teguise', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 29.093, lng: -13.474, descripcion: 'Cala nudista de arena blanca en Teguise. Junto a Charco del Palo, en la costa este de Lanzarote.' },
  { nombre: 'Barranco del Burro — Las Betancoras', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 29.013, lng: -13.641, descripcion: 'Playa nudista de arena oscura en Tinajo. También conocida como Las Betancoras. Parque Natural del Monumento Nacional de la Corona.' },
  { nombre: 'Caleta del Mariscadero', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 29.010, lng: -13.638, descripcion: 'Cala nudista de arena oscura en Tinajo. Entorno volcánico del norte-oeste de Lanzarote.' },
  { nombre: 'La Fuentecita', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 28.862, lng: -13.808, descripcion: 'Cala nudista de arena oscura en Yaiza. Pequeña y aislada en el Monumento Natural de los Ajaches.' },
  { nombre: 'La Colorada', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 28.860, lng: -13.806, descripcion: 'Cala nudista de arena oscura en Yaiza. Nombre por las tonalidades rojizas de sus rocas volcánicas. Muy aislada.' },
  { nombre: 'La Campana — Yaiza', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 28.866, lng: -13.819, descripcion: 'Playa nudista urbana de arena dorada en Yaiza. La única urban de la zona. Acceso más sencillo que las demás calas del Papagayo.' },
  { nombre: 'Playa de la Madera — Tinajo', categoria: 'Playa / Cala', provincia: 'Las Palmas', comunidad: 'Canarias', lat: 29.012, lng: -13.643, descripcion: 'Playa nudista aislada en Tinajo. Caras características naturales únicas del norte volcánico de Lanzarote.' },
];

window.importar = async () => {
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = '⏳ Importando...';
  let ok = 0, skip = 0, err = 0;
  log(`📦 Importando ${lugares.length} lugares...`, 'info');
  for (const lugar of lugares) {
    try {
      const q = query(collection(db, 'lugares'), where('nombre', '==', lugar.nombre), where('provincia', '==', lugar.provincia));
      const snap = await getDocs(q);
      if (!snap.empty) { log(`⏭️ Ya existe: ${lugar.nombre}`, 'info'); skip++; continue; }
      await addDoc(collection(db, 'lugares'), { ...lugar, creado: serverTimestamp(), actualizado: serverTimestamp() });
      log(`✅ ${lugar.nombre}`, 'ok');
      ok++;
      await new Promise(r => setTimeout(r, 100));
    } catch(e) { log(`❌ Error: ${lugar.nombre} — ${e.message}`, 'err'); err++; }
  }
  log(`\n🎉 COMPLETADO: ${ok} añadidos, ${skip} ya existían, ${err} errores.`, 'info');
  document.getElementById('resumen').textContent = `✅ ${ok} añadidos | ⏭️ ${skip} ya existían | ❌ ${err} errores`;
  btn.textContent = '✅ Completado';
};

function log(msg, tipo = '') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = tipo; line.textContent = msg;
  el.appendChild(line); el.scrollTop = el.scrollHeight;
}
</script>
</body>
</html>
