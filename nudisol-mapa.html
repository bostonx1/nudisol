<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nudisol — Mapa</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Google Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB3jsPPuKLPEj3B3y-PsIpXCyZXHxY81aQ&libraries=places"></script>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, getDocs, doc, setDoc, query, where, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB3jsPPuKLPEj3B3y-PsIpXCyZXHxY81aQ",
    authDomain: "nudisol.firebaseapp.com",
    projectId: "nudisol",
    storageBucket: "nudisol.firebasestorage.app",
    messagingSenderId: "222881387953",
    appId: "1:222881387953:web:4299a66c2dcb6b5c941990"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let map;
  let currentUser = null;
  let markers = {};
  let userMarker = null;
  let selectedPlace = null;

  // Lugares nudistas de España — datos iniciales
  const lugaresPredefinidos = [
    { id: 'vera-playa', nombre: 'Playa de Vera', tipo: 'playa', lat: 37.234, lng: -1.834, provincia: 'Almería', verificado: true },
    { id: 'ses-illetes', nombre: 'Ses Illetes', tipo: 'playa', lat: 38.671, lng: 1.393, provincia: 'Formentera', verificado: true },
    { id: 'es-trenc', nombre: 'Es Trenc', tipo: 'playa', lat: 39.339, lng: 2.993, provincia: 'Mallorca', verificado: true },
    { id: 'costa-natura', nombre: 'Costa Natura', tipo: 'resort', lat: 36.421, lng: -5.148, provincia: 'Málaga', verificado: true },
    { id: 'cala-comte', nombre: 'Cala Comte', tipo: 'playa', lat: 38.979, lng: 1.225, provincia: 'Ibiza', verificado: true },
    { id: 'maspalomas', nombre: 'Playa de Maspalomas', tipo: 'playa', lat: 27.740, lng: -15.586, provincia: 'Gran Canaria', verificado: true },
    { id: 'portus', nombre: 'El Portús', tipo: 'camping', lat: 37.584, lng: -0.989, provincia: 'Murcia', verificado: true },
    { id: 'templo-sol', nombre: 'El Templo del Sol', tipo: 'camping', lat: 41.127, lng: 1.248, provincia: 'Tarragona', verificado: true },
    { id: 'playa-papagayo', nombre: 'Playa Papagayo', tipo: 'playa', lat: 28.845, lng: -13.763, provincia: 'Lanzarote', verificado: true },
    { id: 'cala-pregonda', nombre: 'Cala Pregonda', tipo: 'playa', lat: 40.056, lng: 3.946, provincia: 'Menorca', verificado: true },
  ];

  // Iconos por tipo
  const tipoIcono = { playa: '🏖️', camping: '⛺', resort: '🏨', club: '🏊' };
  const tipoColor = { playa: '#1A6B72', camping: '#4A7C59', resort: '#D45F3C', club: '#E8A020' };

  // Inicializar mapa
  window.initMap = () => {
    map = new google.maps.Map(document.getElementById('map'), {
      center: { lat: 39.5, lng: -3.5 },
      zoom: 6,
      mapTypeId: 'roadmap',
      styles: [
        { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#2A9BA5' }] },
        { featureType: 'landscape', elementType: 'geometry', stylers: [{ color: '#E8DCC8' }] },
        { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#FDFAF5' }] },
        { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] },
        { featureType: 'transit', stylers: [{ visibility: 'off' }] },
      ],
      disableDefaultUI: true,
      zoomControl: true,
    });

    // Cargar lugares
    cargarLugares();

    // Escuchar checkins en tiempo real
    escucharCheckins();
  };

  // Cargar lugares en el mapa
  async function cargarLugares() {
    // Primero cargamos los predefinidos en Firebase si no existen
    for (const lugar of lugaresPredefinidos) {
      const ref = doc(db, 'lugares', lugar.id);
      await setDoc(ref, {
        ...lugar,
        checkins: 0,
        textiles: 0,
        ultimaActualizacion: serverTimestamp()
      }, { merge: true });
    }

    // Mostrar en el mapa
    for (const lugar of lugaresPredefinidos) {
      agregarMarker(lugar, 0);
    }
  }

  // Añadir marker al mapa
  function agregarMarker(lugar, checkins) {
    const color = tipoColor[lugar.tipo] || '#1A6B72';
    const icono = tipoIcono[lugar.tipo] || '📍';

    const marker = new google.maps.Marker({
      position: { lat: lugar.lat, lng: lugar.lng },
      map: map,
      title: lugar.nombre,
      icon: {
        url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="60" height="36">
            <rect x="0" y="0" width="60" height="28" rx="14" fill="${color}"/>
            <text x="10" y="19" font-size="13" font-family="Arial">
              ${checkins > 0 ? `👥${checkins}` : icono}
            </text>
            <polygon points="28,28 32,28 30,36" fill="${color}"/>
          </svg>
        `)}`,
        scaledSize: new google.maps.Size(60, 36),
        anchor: new google.maps.Point(30, 36),
      }
    });

    marker.addListener('click', () => {
      mostrarFicha(lugar, checkins);
    });

    markers[lugar.id] = { marker, lugar, checkins };
  }

  // Escuchar checkins en tiempo real
  function escucharCheckins() {
    const ahora = new Date();
    ahora.setHours(ahora.getHours() - 3); // últimas 3 horas

    onSnapshot(collection(db, 'checkins'), (snapshot) => {
      const conteos = {};
      snapshot.forEach((doc) => {
        const data = doc.data();
        if (data.lugarId) {
          conteos[data.lugarId] = (conteos[data.lugarId] || 0) + 1;
        }
      });

      // Actualizar markers
      for (const id in markers) {
        const { lugar } = markers[id];
        const checkins = conteos[id] || 0;
        markers[id].marker.setMap(null);
        agregarMarker(lugar, checkins);
      }

      // Actualizar contador total
      const total = Object.values(conteos).reduce((a, b) => a + b, 0);
      document.getElementById('total-checkins').textContent = total;
    });
  }

  // Mostrar ficha del lugar
  function mostrarFicha(lugar, checkins) {
    selectedPlace = lugar;
    const icono = tipoIcono[lugar.tipo] || '📍';

    document.getElementById('ficha-nombre').textContent = lugar.nombre;
    document.getElementById('ficha-ubicacion').textContent = `📍 ${lugar.provincia}`;
    document.getElementById('ficha-tipo').textContent = `${icono} ${lugar.tipo.charAt(0).toUpperCase() + lugar.tipo.slice(1)}`;
    document.getElementById('ficha-checkins').textContent = checkins;
    document.getElementById('ficha-verificado').textContent = lugar.verificado ? '✓ Verificado' : 'No verificado';

    document.getElementById('ficha').style.display = 'flex';

    // Centrar mapa
    map.panTo({ lat: lugar.lat, lng: lugar.lng });
    map.setZoom(12);
  }

  // Cerrar ficha
  window.cerrarFicha = () => {
    document.getElementById('ficha').style.display = 'none';
    selectedPlace = null;
    map.setZoom(6);
    map.panTo({ lat: 39.5, lng: -3.5 });
  };

  // Check-in
  window.hacerCheckin = async () => {
    if (!currentUser) {
      window.location.href = 'nudisol-login.html';
      return;
    }
    if (!selectedPlace) return;

    const btn = document.getElementById('btn-checkin');
    btn.disabled = true;
    btn.textContent = '⏳ Registrando...';

    try {
      await setDoc(doc(db, 'checkins', `${currentUser.uid}_${selectedPlace.id}`), {
        usuarioId: currentUser.uid,
        lugarId: selectedPlace.id,
        lugarNombre: selectedPlace.nombre,
        fecha: serverTimestamp(),
        textiles: 0
      });

      btn.textContent = '✅ ¡Check-in hecho!';
      btn.style.background = '#4A7C59';

      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '📍 Estoy aquí ahora';
        btn.style.background = '';
      }, 3000);

    } catch (error) {
      btn.textContent = '❌ Error, inténtalo';
      btn.disabled = false;
    }
  };

  // Mi ubicación
  window.miUbicacion = () => {
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition((pos) => {
        const { latitude, longitude } = pos.coords;
        map.panTo({ lat: latitude, lng: longitude });
        map.setZoom(10);

        if (userMarker) userMarker.setMap(null);
        userMarker = new google.maps.Marker({
          position: { lat: latitude, lng: longitude },
          map: map,
          icon: {
            url: `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(`
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20">
                <circle cx="10" cy="10" r="8" fill="#1A6B72" stroke="white" stroke-width="2"/>
              </svg>
            `)}`,
            scaledSize: new google.maps.Size(20, 20),
            anchor: new google.maps.Point(10, 10),
          }
        });
      });
    }
  };

  // Auth
  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (user) {
      document.getElementById('user-info').textContent = user.email.split('@')[0];
      document.getElementById('btn-login-nav').style.display = 'none';
      document.getElementById('user-info').style.display = 'block';
    } else {
      document.getElementById('btn-login-nav').style.display = 'block';
      document.getElementById('user-info').style.display = 'none';
    }
  });

  window.cerrarSesion = async () => {
    await signOut(auth);
    window.location.href = 'nudisol-login.html';
  };

  // Inicializar mapa cuando cargue todo
  window.addEventListener('load', () => {
    initMap();
  });
</script>

<style>
  :root {
    --ocean-deep: #0D3D42;
    --ocean: #1A6B72;
    --ocean-light: #2A9BA5;
    --sun: #E8A020;
    --coral: #D45F3C;
    --sand-light: #F5EFE3;
    --white: #FDFAF5;
    --text-dark: #1A1A1A;
    --text-mid: #4A4A4A;
    --text-light: #8A8A8A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  .header {
    background: var(--ocean-deep);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    flex-shrink: 0;
  }

  .header-logo {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: white;
    letter-spacing: -0.5px;
  }

  .header-logo span { color: #F5C840; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(212,95,60,0.2);
    border: 1px solid rgba(212,95,60,0.4);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 12px;
    font-weight: 600;
    color: #D45F3C;
    font-family: 'Syne', sans-serif;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: #D45F3C;
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #user-info {
    display: none;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
  }

  #btn-login-nav {
    background: var(--coral);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 6px 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
  }

  /* MAPA */
  #map {
    flex: 1;
    width: 100%;
  }

  /* CONTROLES MAPA */
  .map-controls {
    position: absolute;
    bottom: 120px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 50;
  }

  .map-btn {
    width: 42px;
    height: 42px;
    background: white;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }

  .map-btn:hover { transform: scale(1.05); }

  /* FICHA LUGAR */
  #ficha {
    display: none;
    position: absolute;
    bottom: 70px;
    left: 12px;
    right: 12px;
    background: var(--white);
    border-radius: 20px;
    padding: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    z-index: 100;
    flex-direction: column;
    gap: 12px;
    max-width: 420px;
    margin: 0 auto;
  }

  .ficha-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .ficha-nombre {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    color: var(--text-dark);
    line-height: 1.2;
  }

  .ficha-ubicacion {
    font-size: 12px;
    color: var(--text-light);
    margin-top: 2px;
  }

  .ficha-close {
    background: var(--sand-light);
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 14px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .ficha-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .fstat {
    background: var(--ocean-deep);
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }

  .fstat-icon { font-size: 16px; margin-bottom: 2px; }

  .fstat-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: white;
  }

  .fstat-label {
    font-size: 9px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ficha-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .ftag {
    background: var(--sand-light);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text-mid);
    font-weight: 500;
  }

  .ftag.green { background: #e8f4ec; color: #4A7C59; font-weight: 700; }

  #btn-checkin {
    width: 100%;
    background: var(--coral);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 13px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(212,95,60,0.3);
    transition: all 0.2s;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    background: var(--white);
    border-top: 1px solid rgba(0,0,0,0.08);
    display: flex;
    justify-content: space-around;
    padding: 8px 0 12px;
    flex-shrink: 0;
    z-index: 100;
  }

  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    opacity: 0.4;
    text-decoration: none;
  }

  .nav-item.active { opacity: 1; }

  .nav-icon { font-size: 20px; }

  .nav-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--ocean);
    font-family: 'Syne', sans-serif;
  }

  .map-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">nudi<span>sol</span></div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="total-checkins">0</span> ahora
    </div>
    <span id="user-info" onclick="cerrarSesion()">Salir</span>
    <button id="btn-login-nav" onclick="window.location.href='nudisol-login.html'">Entrar</button>
  </div>
</div>

<!-- MAPA -->
<div class="map-container">
  <div id="map"></div>

  <!-- Controles -->
  <div class="map-controls">
    <button class="map-btn" onclick="miUbicacion()" title="Mi ubicación">📍</button>
    <button class="map-btn" onclick="map.setZoom(map.getZoom()+1)">＋</button>
    <button class="map-btn" onclick="map.setZoom(map.getZoom()-1)">－</button>
  </div>

  <!-- Ficha lugar -->
  <div id="ficha">
    <div class="ficha-header">
      <div>
        <div class="ficha-nombre" id="ficha-nombre">Lugar</div>
        <div class="ficha-ubicacion" id="ficha-ubicacion"></div>
      </div>
      <button class="ficha-close" onclick="cerrarFicha()">✕</button>
    </div>

    <div class="ficha-stats">
      <div class="fstat">
        <div class="fstat-icon">👥</div>
        <div class="fstat-value" id="ficha-checkins">0</div>
        <div class="fstat-label">Ahora</div>
      </div>
      <div class="fstat">
        <div class="fstat-icon">👔</div>
        <div class="fstat-value">0</div>
        <div class="fstat-label">Textiles</div>
      </div>
      <div class="fstat">
        <div class="fstat-icon">☀️</div>
        <div class="fstat-value">28°</div>
        <div class="fstat-label">Temp.</div>
      </div>
    </div>

    <div class="ficha-tags">
      <span class="ftag green" id="ficha-verificado">✓ Verificado</span>
      <span class="ftag" id="ficha-tipo">Playa</span>
    </div>

    <button id="btn-checkin" onclick="hacerCheckin()">📍 Estoy aquí ahora</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a class="nav-item active" href="nudisol-mapa.html">
    <div class="nav-icon">🗺️</div>
    <div class="nav-label">Mapa</div>
  </a>
  <a class="nav-item" href="#">
    <div class="nav-icon">🔍</div>
    <div class="nav-label">Buscar</div>
  </a>
  <a class="nav-item" href="#">
    <div class="nav-icon">🏨</div>
    <div class="nav-label">Alojamiento</div>
  </a>
  <a class="nav-item" href="nudisol-login.html">
    <div class="nav-icon">👤</div>
    <div class="nav-label">Perfil</div>
  </a>
</div>

</body>
</html>
