window.importar = async () => {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = '⏳ Importando...';

  const resumen = document.getElementById('resumen');
  let ok = 0, skip = 0, err = 0;

  log(`📦 Iniciando importación de ${lugares.length} lugares...`, 'info');

  for (const lugar of lugares) {
    try {
      // Verificar si ya existe
      const q = query(collection(db, 'lugares'), where('nombre', '==', lugar.nombre), where('provincia', '==', lugar.provincia));
      const snap = await getDocs(q);
      if (!snap.empty) {
        log(`⏭️ Ya existe: ${lugar.nombre} (${lugar.provincia})`, 'info');
        skip++;
        continue;
      }

      await addDoc(collection(db, 'lugares'), {
        ...lugar,
        creado: serverTimestamp(),
        actualizado: serverTimestamp()
      });
      log(`✅ Añadido: ${lugar.nombre} — ${lugar.provincia}`, 'ok');
      ok++;

      // Pequeña pausa para no saturar Firestore
      await new Promise(r => setTimeout(r, 100));
    } catch(e) {
      log(`❌ Error: ${lugar.nombre} — ${e.message}`, 'err');
      err++;
    }
  }

  log(`\n🎉 COMPLETADO: ${ok} añadidos, ${skip} ya existían, ${err} errores.`, 'info');
  resumen.textContent = `✅ ${ok} lugares añadidos | ⏭️ ${skip} ya existían | ❌ ${err} errores`;
  btn.textContent = '✅ Importación completada';
};

function log(msg, tipo = '') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = tipo;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}
