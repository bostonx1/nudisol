<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nudisol — Notificaciones</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<meta name="theme-color" content="#0D3D42">
<style>
  :root { --ocean-deep: #0D3D42; --ocean: #1A6B72; --coral: #D45F3C; --sand-light: #F5EFE3; --white: #FDFAF5; --text-dark: #1A1A1A; --text-light: #8A8A8A; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--ocean-deep); min-height: 100vh; }
  .header { background: linear-gradient(180deg, #0a2e32 0%, var(--ocean-deep) 100%); padding: 20px 20px 40px; }
  .header-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .back-btn { color: rgba(255,255,255,0.6); font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; text-decoration: none; background: none; border: none; cursor: pointer; }
  .logo-small { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 20px; color: white; letter-spacing: -0.5px; }
  .logo-small span { color: #F5C840; }
  .page-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; color: white; text-align: center; }
  .main { padding: 24px 16px; }
  .card { background: var(--white); border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.15); margin-bottom: 20px; }
  .menu-item { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-bottom: 1px solid rgba(0,0,0,0.05); }
  .menu-item:last-child { border-bottom: none; }
  .menu-icono { width: 36px; height: 36px; border-radius: 10px; background: rgba(232,160,32,0.1); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .menu-info { flex: 1; }
  .menu-texto { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 14px; color: var(--text-dark); }
  .menu-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .toggle { position: relative; width: 44px; height: 26px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: #ccc; border-radius: 26px; cursor: not-allowed; }
  .toggle-slider::before { content: ''; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; background: white; border-radius: 50%; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
  .proximamente-badge { display: inline-block; background: rgba(232,160,32,0.15); color: #a06b00; border: 1px solid rgba(232,160,32,0.3); border-radius: 20px; padding: 3px 10px; font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 700; }
  .info-box { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; text-align: center; }
  .info-icon { font-size: 36px; margin-bottom: 10px; }
  .info-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; color: white; margin-bottom: 6px; }
  .info-text { font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.5; }
</style>
</head>
<body>
<div class="header">
  <div class="header-nav">
    <button class="back-btn" id="back-btn" onclick="window.location.href='nudisol-perfil.html'">← Perfil</button>
    <div class="logo-small">nudi<span>sol</span></div>
    <div style="width:60px;"></div>
  </div>
  <div class="page-title" id="page-title">Notificaciones</div>
</div>

<div class="main">
  <div class="card">
    <div class="menu-item">
      <div class="menu-icono">🔔</div>
      <div class="menu-info">
        <div class="menu-texto" id="txt-activar">Activar notificaciones</div>
        <div class="menu-sub"><span class="proximamente-badge" id="badge-1">Próximamente</span></div>
      </div>
      <label class="toggle"><input type="checkbox" disabled><span class="toggle-slider"></span></label>
    </div>
    <div class="menu-item">
      <div class="menu-icono">📍</div>
      <div class="menu-info">
        <div class="menu-texto" id="txt-cercanos">Check-ins cercanos</div>
        <div class="menu-sub"><span class="proximamente-badge" id="badge-2">Próximamente</span></div>
      </div>
      <label class="toggle"><input type="checkbox" disabled><span class="toggle-slider"></span></label>
    </div>
    <div class="menu-item">
      <div class="menu-icono">🏡</div>
      <div class="menu-info">
        <div class="menu-texto" id="txt-alojamientos">Nuevos alojamientos</div>
        <div class="menu-sub"><span class="proximamente-badge" id="badge-3">Próximamente</span></div>
      </div>
      <label class="toggle"><input type="checkbox" disabled><span class="toggle-slider"></span></label>
    </div>
  </div>

  <div class="info-box">
    <div class="info-icon">🔕</div>
    <div class="info-title" id="info-title">Las notificaciones llegarán pronto</div>
    <div class="info-text" id="info-text">Estamos trabajando en el sistema de notificaciones. Estará disponible en la próxima versión de Nudisol.</div>
  </div>
</div>

<script>
const tNotif = {
  es: {
    pageTitle: 'Notificaciones', backBtn: '← Perfil',
    activar: 'Activar notificaciones', cercanos: 'Check-ins cercanos', alojamientos: 'Nuevos alojamientos',
    proximamente: 'Próximamente',
    infoTitle: 'Las notificaciones llegarán pronto',
    infoText: 'Estamos trabajando en el sistema de notificaciones. Estará disponible en la próxima versión de Nudisol.'
  },
  en: {
    pageTitle: 'Notifications', backBtn: '← Profile',
    activar: 'Enable notifications', cercanos: 'Nearby check-ins', alojamientos: 'New accommodations',
    proximamente: 'Coming soon',
    infoTitle: 'Notifications coming soon',
    infoText: 'We are working on the notification system. It will be available in the next version of Nudisol.'
  }
};

function applyLang() {
  const lang = localStorage.getItem('nudisol_lang') || 'es';
  const tr = tNotif[lang];
  document.getElementById('page-title').textContent = tr.pageTitle;
  document.getElementById('back-btn').textContent = tr.backBtn;
  document.getElementById('txt-activar').textContent = tr.activar;
  document.getElementById('txt-cercanos').textContent = tr.cercanos;
  document.getElementById('txt-alojamientos').textContent = tr.alojamientos;
  document.getElementById('badge-1').textContent = tr.proximamente;
  document.getElementById('badge-2').textContent = tr.proximamente;
  document.getElementById('badge-3').textContent = tr.proximamente;
  document.getElementById('info-title').textContent = tr.infoTitle;
  document.getElementById('info-text').textContent = tr.infoText;
}

window.addEventListener('DOMContentLoaded', applyLang);
</script>
</body>
</html>
