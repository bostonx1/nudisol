<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nudisol — siente el sol en tu piel</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nudisol">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#0D3D42">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
    background: #0D3D42;
  }

  /* Foto de fondo */
  .bg {
    position: fixed;
    inset: 0;
    background: url('/portada_app_nudisol.png') center center / cover no-repeat;
    z-index: 0;
  }

  /* Gradiente oscuro en la parte inferior para que el texto sea legible */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.1) 0%,
      rgba(0,0,0,0.15) 40%,
      rgba(13,61,66,0.7) 70%,
      rgba(13,61,66,0.95) 100%
    );
  }

  /* Contenido sobre la foto */
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 60px;
    gap: 8px;
    animation: fadeUp 0.8s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    font-size: 42px;
    font-weight: 900;
    color: white;
    letter-spacing: -1px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }
  .logo span { color: #F5C840; }

  .tagline {
    font-size: 15px;
    color: rgba(255,255,255,0.75);
    font-style: italic;
    letter-spacing: 0.3px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.5);
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #F5C840;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-top: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="content">
    <div class="logo">nudi<span>sol</span></div>
    <div class="tagline">siente el sol en tu piel</div>
    <div class="spinner"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
    setTimeout(() => { window.location.href = '/nudisol-login.html'; }, 1800);
  </script>
</body>
</html>
