<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nudisol — siente el sol en tu piel</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nudisol">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#0D3D42">
<!-- Precargar la imagen -->
<link rel="preload" as="image" href="/portada_app_nudisol.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
    background: #0D3D42;
  }

  .bg {
    position: fixed;
    inset: 0;
    background-color: #0D3D42;
    background-image: url('/portada_app_nudisol.png');
    background-size: cover;
    background-position: center center;
    z-index: 0;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .bg.loaded { opacity: 1; }

  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.1) 0%,
      rgba(0,0,0,0.15) 40%,
      rgba(13,61,66,0.7) 70%,
      rgba(13,61,66,0.95) 100%
    );
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 60px;
    gap: 8px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
  }
  .content.loaded { opacity: 1; transform: translateY(0); }

  .logo {
    font-size: 42px;
    font-weight: 900;
    color: white;
    letter-spacing: -1px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }
  .logo span { color: #F5C840; }

  .tagline {
    font-size: 15px;
    color: rgba(255,255,255,0.75);
    font-style: italic;
    letter-spacing: 0.3px;
    text-shadow: 0 1px 8px rgba(0,0,0,0.5);
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #F5C840;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-top: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
  <div class="bg" id="bg"></div>
  <div class="content" id="content">
    <div class="logo">nudi<span>sol</span></div>
    <div class="tagline">siente el sol en tu piel</div>
    <div class="spinner"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }

    // Precargar imagen y mostrar cuando esté lista
    const img = new Image();
    img.src = '/portada_app_nudisol.png';

    function mostrarYRedirigir() {
      document.getElementById('bg').classList.add('loaded');
      document.getElementById('content').classList.add('loaded');
      // Redirigir 2.5 seg después de que la foto sea visible
      setTimeout(() => {
        window.location.href = '/nudisol-login.html';
      }, 4000);
    }

    if (img.complete) {
      // Ya estaba en caché
      mostrarYRedirigir();
    } else {
      img.onload = mostrarYRedirigir;
      // Si falla la carga, redirigir igual
      img.onerror = () => {
        document.getElementById('content').classList.add('loaded');
        setTimeout(() => { window.location.href = '/nudisol-login.html'; }, 1500);
      };
    }
  </script>
</body>
</html>
