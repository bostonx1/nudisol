<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nudisol — Mi Perfil</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nudisol">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#0D3D42">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, where, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyB3jsPPuKLPEj3B3y-PsIpXCyZXHxY81aQ",
    authDomain: "nudisol.firebaseapp.com",
    projectId: "nudisol",
    storageBucket: "nudisol.firebasestorage.app",
    messagingSenderId: "222881387953",
    appId: "1:222881387953:web:4299a66c2dcb6b5c941990"
  });

  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = 'nudisol-login.html';
      return;
    }
    await cargarPerfil(user);
  });

  async function cargarPerfil(user) {
    try {
      // Cargar datos del usuario
      const userDoc = await getDoc(doc(db, 'usuarios', user.uid));
      const userData = userDoc.exists() ? userDoc.data() : {};
      const nombre = userData.nombre || user.email.split('@')[0];
      const tipo = userData.tipo || 'nudista';
      const fechaRegistro = userData.fechaRegistro?.toDate ? userData.fechaRegistro.toDate() : new Date();

      // Mostrar avatar con iniciales
      const iniciales = nombre.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
      document.getElementById('avatar-iniciales').textContent = iniciales;
      document.getElementById('perfil-nombre').textContent = nombre;
      document.getElementById('perfil-email').textContent = user.email;
      document.getElementById('perfil-tipo').textContent = tipoLabel(tipo);

      // Cargar check-ins
      const checkinsQ = query(
        collection(db, 'checkins'),
        where('usuarioId', '==', user.uid),
        orderBy('fecha', 'desc')
      );
      const checkinsSnap = await getDocs(checkinsQ);
      const checkins = [];
      checkinsSnap.forEach(d => checkins.push({ id: d.id, ...d.data() }));

      // Calcular stats
      const totalCheckins = checkins.length;
      const playasUnicas = new Set(checkins.map(c => c.lugarId)).size;
      const diasActivo = Math.floor((new Date() - fechaRegistro) / (1000 * 60 * 60 * 24));

      // Mostrar stats
      animarNumero('stat-checkins', totalCheckins);
      animarNumero('stat-playas', playasUnicas);
      animarNumero('stat-dias', diasActivo);

      // Renderizar historial
      renderHistorial(checkins);

      // Ocultar skeleton
      document.getElementById('skeleton').style.display = 'none';
      document.getElementById('contenido').style.display = 'block';
      document.getElementById('contenido').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('contenido').style.transition = 'opacity 0.4s ease';
        document.getElementById('contenido').style.opacity = '1';
      }, 10);

      // Aplicar idioma
      if (typeof applyLangPerfil === 'function') applyLangPerfil();

    } catch (e) {
      console.error('Error cargando perfil:', e);
      document.getElementById('skeleton').innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.5)">Error cargando perfil</div>';
    }
  }

  function tipoLabel(tipo) {
    const lang = localStorage.getItem('nudisol_lang') || 'es';
    const map = tPerfil[lang]?.tipoMap || tPerfil.es.tipoMap;
    return map[tipo] || tipo;
  }

  function animarNumero(id, target) {
    const el = document.getElementById(id);
    if (target === 0) { el.textContent = '0'; return; }
    let start = 0;
    const duration = 800;
    const step = Math.ceil(target / (duration / 16));
    const interval = setInterval(() => {
      start = Math.min(start + step, target);
      el.textContent = start;
      if (start >= target) clearInterval(interval);
    }, 16);
  }

  function renderHistorial(checkins) {
    const container = document.getElementById('historial-lista');
    if (checkins.length === 0) {
      container.innerHTML = `<div class="historial-vacio">
        <div class="historial-vacio-icon">🏖️</div>
        <div class="historial-vacio-texto">Aún no has hecho ningún check-in</div>
        <div class="historial-vacio-sub">¡Encuentra una playa y empieza tu aventura!</div>
      </div>`;
      return;
    }

    container.innerHTML = checkins.map((c, i) => {
      const fecha = c.fecha?.toDate ? c.fecha.toDate() : new Date();
      const fechaStr = fecha.toLocaleDateString('es-ES', { day: 'numeric', month: 'short', year: 'numeric' });
      const horaStr = fecha.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      const textil = c.textiles ? '👙 Textil' : '🌞 Nudista';
      return `<div class="checkin-item" style="animation-delay:${i * 0.05}s">
        <div class="checkin-icono">🏖️</div>
        <div class="checkin-info">
          <div class="checkin-lugar">${c.lugarNombre || 'Lugar desconocido'}</div>
          <div class="checkin-meta">${fechaStr} · ${horaStr}</div>
        </div>
        <div class="checkin-badge ${c.textiles ? 'badge-textil' : 'badge-nudista'}">${textil}</div>
      </div>`;
    }).join('');
  }

  window.cerrarSesion = async () => {
    try {
      await signOut(auth);
      window.location.href = 'nudisol-login.html';
    } catch (e) {
      console.error('Error cerrando sesión:', e);
    }
  };
</script>

<style>

    font-weight: 700;
    font-size: 20px;
    color: white;
    letter-spacing: -0.5px;

  .logo-small span { color: #F5C840; }

  /* AVATAR SECTION */
  .avatar-section {
    display: flex;
    flex-direction: column;

    gap: 12px;
    padding-bottom: 32px;
  }

  .avatar {

    height: 88px;

    font-weight: 800;
    font-size: 22px;

    letter-spacing: -0.5px;

    font-size: 13px;
    color: rgba(255,255,255,0.45);
    margin-top: -6px;
  }

  .perfil-tipo {

    font-family: 'Syne', sans-serif;

    color: rgba(255,255,255,0.8);
  }

  /* WAVE SEPARATOR */
  .wave {
    display: block;
    width: 100%;
    margin-bottom: -2px;

  /* MAIN CONTENT */

    padding: 0 16px;

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
    margin-top: -20px;
  }

  .stat-card {
    background: var(--white);
    border-radius: 24px;
    padding: 18px 10px 14px;
    text-align: center;
    box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 24px 24px 0 0;
  }

  .stat-card.coral::before { background: var(--coral); }
  .stat-card.verde::before { background: #4A9B72; }
  .stat-card.sol::before { background: #E8A020; }

  .stat-numero {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 30px;
    line-height: 1;
    margin-bottom: 4px;

  .stat-card.verde .stat-numero { color: #4A9B72; }

  .stat-label {

    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat-icon {
    font-size: 18px;
    margin-bottom: 6px;
  }

  /* SECTION */
  .section {

    border-radius: 20px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);

  .section-header {

  .checkin-icono {
    font-size: 22px;

    background: rgba(13,61,66,0.06);

  }

</style>

<script>
const tPerfil = {
  es: {
    checkins: 'Check-ins', playas: 'Playas', diasActivo: 'Días activo',
    misCheckins: 'Mis check-ins', cargando: 'Cargando...',
    miCuenta: 'Mi cuenta', editarPerfil: 'Editar perfil',
    notificaciones: 'Notificaciones', privacidad: 'Privacidad',
    cerrarSesion: 'Cerrar sesión',
    navInicio: 'Inicio', navMapa: 'Lugares', navComunidad: 'Comunidad', navAloj: 'Alojamiento', navPerfil: 'Perfil', back: '← Inicio',

function applyLangPerfil() {
  const lang = localStorage.getItem('nudisol_lang') || 'es';
  const tr = tPerfil[lang];
  const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
  set('lbl-checkins', tr.checkins);
  set('lbl-playas', tr.playas);
  set('lbl-dias', tr.diasActivo);
  set('lbl-mis-checkins', tr.misCheckins);
  set('lbl-cargando', tr.cargando);
  set('lbl-mi-cuenta', tr.miCuenta);
  set('lbl-editar-perfil', tr.editarPerfil);
  set('lbl-notificaciones', tr.notificaciones);
  set('lbl-privacidad', tr.privacidad);
  set('lbl-cerrar-sesion', tr.cerrarSesion);
  set('nav-lbl-inicio', tr.navInicio);
  set('nav-lbl-mapa', tr.navMapa);
  set('nav-lbl-comunidad', tr.navComunidad);
  set('nav-lbl-aloj', tr.navAloj);
  set('nav-lbl-perfil', tr.navPerfil);
  const back = document.getElementById('perfil-back');
  if (back) back.textContent = tr.back;
}

window.addEventListener('DOMContentLoaded', applyLangPerfil);
